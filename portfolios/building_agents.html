  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #6060a0;
    --accent: #7c3aed;
    --gold: #d4af37;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 80px 20px 50px;
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .building-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent);
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(44px, 8vw, 82px);
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1; margin-bottom: 18px;
  }
  .subtitle { color: var(--muted); font-size: 15px; max-width: 480px; margin: 0 auto 36px; line-height: 1.6; }
  .stats-bar { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; }
  .stat-num { font-size: 30px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* CONTROLS */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 36px 20px 24px; }
  .search-wrap { position: relative; width: 100%; max-width: 400px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
  .search {
    width: 100%; padding: 12px 20px 12px 40px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 100px; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search:focus { border-color: var(--accent); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .filter-btn {
    padding: 7px 18px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--bg2);
    color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent); color: var(--text);
    background: rgba(124,58,237,0.12);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px; padding: 10px 36px 80px;
    max-width: 1560px; margin: 0 auto;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    position: relative; overflow: hidden;
    transition: all 0.3s ease; cursor: default;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--cc, var(--accent));
  }
  .card:hover {
    border-color: var(--cc, var(--accent));
    transform: translateY(-5px);
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
  }
  .card.hidden { display: none; }

  /* AVATAR + HEADER */
  .card-top {
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;
  }
  .avatar-wrap {
    width: 72px; height: 72px; flex-shrink: 0;
    border-radius: 50%; overflow: hidden;
    border: 2px solid var(--cc, var(--accent));
    box-shadow: 0 0 16px var(--cc, var(--accent)), 0 0 0 1px var(--bg2);
    transition: box-shadow 0.3s;
  }
  .card:hover .avatar-wrap {
    box-shadow: 0 0 28px var(--cc, var(--accent)), 0 0 0 2px var(--cc, var(--accent));
  }
  .avatar-wrap svg { width: 100%; height: 100%; }

  .agent-meta { flex: 1; min-width: 0; }
  .agent-id {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--cc, var(--muted)); letter-spacing: 2px; margin-bottom: 2px;
  }
  .agent-name { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .agent-title { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .agent-level { text-align: right; flex-shrink: 0; }
  .level-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--cc, var(--accent)); line-height: 1;
  }
  .level-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .rpg-class { font-size: 10px; color: var(--gold); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

  /* QUOTE */
  .quote {
    font-size: 11.5px; color: var(--muted); font-style: italic;
    border-left: 2px solid var(--cc, var(--border));
    padding-left: 10px; margin-bottom: 14px; line-height: 1.5;
  }

  /* SKILLS */
  .skills { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .skill { display: flex; align-items: center; gap: 8px; }
  .skill-name {
    font-size: 9.5px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; width: 100px; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .skill-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .skill-fill { height: 100%; background: var(--cc, var(--accent)); border-radius: 2px; transition: width 1.2s ease; }
  .skill-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--cc, var(--accent)); width: 24px; text-align: right; flex-shrink: 0; }

  /* TAGS */
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .tag {
    padding: 3px 9px; border-radius: 100px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }

  /* WORKSHOP BADGE */
  .badge {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 11px;
    background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.18);
    border-radius: 8px; font-size: 10.5px; color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ETAGE DIVIDER */
  .etage-div {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 24px 0 8px;
  }
  .etage-line { flex: 1; height: 1px; background: var(--border); }
  .etage-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 3px; text-transform: uppercase;
    white-space: nowrap;
  }

  /* FOOTER */
  .footer {
    text-align: center; padding: 36px 20px;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>

function buildCard(a) {
  const skillsHTML = a.skills.map(([n, pct, val]) => `
    <div class="skill">
      <span class="skill-name">${n}</span>
      <div class="skill-bar"><div class="skill-fill" style="width:0%" data-w="${pct}%"></div></div>
      <span class="skill-val">${val}</span>
    </div>`).join('');

  const tagsHTML = a.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const avatar = AVATARS[a.key] || `<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="38" fill="#1a1a2e"/><text x="40" y="48" text-anchor="middle" font-size="32" fill="${a.color}">?</text></svg>`;

  return `
  <div class="card" style="--cc:${a.color}" data-cat="${a.cat}" data-name="${a.name.toLowerCase()}">
    <div class="card-top">
      <div class="avatar-wrap">${avatar}</div>
      <div class="agent-meta">
        <div class="agent-id">AGENT #${a.id}${a.cat.includes('clan') ? ' · CLAN' : ''}</div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-title">${a.title}</div>
        <div class="rpg-class">${a.rpg}</div>
      </div>
      <div class="agent-level">
        <div class="level-num">${a.level}</div>
        <div class="level-label">LVL</div>
      </div>
    </div>
    <div class="quote">"${a.quote}"</div>
    <div class="skills">${skillsHTML}</div>
    <div class="tags">${tagsHTML}</div>
    <div class="badge"><div class="badge-dot"></div>${a.badge}</div>
  </div>`;
}

function buildDivider(label) {
  return `<div class="etage-div" data-divider="1">
    <div class="etage-line"></div>
    <div class="etage-label">${label}</div>
    <div class="etage-line"></div>
  </div>`;
}

// Render
const grid = document.getElementById('grid');
AGENTS.forEach(a => {
  if (a.divider) {
    grid.innerHTML += buildDivider(a.label);
  } else {
    grid.innerHTML += buildCard(a);
  }
});

// Animate skill bars after render
setTimeout(() => {
  document.querySelectorAll('.skill-fill').forEach(el => {
    el.style.width = el.dataset.w;
  });
}, 300);

// Filter
function filterCat(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card[data-cat]').forEach(card => {
    const show = cat === 'all' || card.dataset.cat.includes(cat);
    card.classList.toggle('hidden', !show);
  });
  // Hide empty dividers
  document.querySelectorAll('[data-divider]').forEach(div => {
    div.style.display = 'flex';
    if (cat !== 'all') {
      const next = div.nextElementSibling;
      if (!next || next.dataset.divider) div.style.display = 'none';
    }
  });
}

function filterSearch(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('.card[data-name]').forEach(card => {
    const match = !q || card.dataset.name.includes(q) || card.innerText.toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
  });
}
</script>
</body>
</html>
