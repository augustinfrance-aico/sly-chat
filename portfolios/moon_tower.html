// === BENTLEY LOADING — Pixel art turtle (Sly Cooper) ===
(function(){
  const bc = document.getElementById('bentleySprite').getContext('2d');
  const s = 4; // scale
  function bp(x,y,c){bc.fillStyle=c;bc.fillRect(x*s,y*s,s,s)}

  // Bentley — green turtle with glasses, wheelchair
  // Shell (dark green)
  const shell='#2E7D32', shellD='#1B5E20', skin='#81C784', glasses='#BBDEFB', frame='#333';
  // Head
  [3,4,5,6,7,8].forEach(x=>{bp(x,2,skin);bp(x,3,skin)});
  [4,5,6,7].forEach(x=>bp(x,1,skin));
  // Glasses
  bp(3,2,glasses);bp(4,2,'#111');bp(5,2,glasses);bp(6,2,'#111');bp(7,2,glasses);bp(8,2,glasses);
  bp(4,3,'#111');bp(6,3,'#111'); // eyes behind glasses
  // Mouth
  bp(5,4,skin);bp(6,4,skin);bp(5,5,'#C62828');
  // Shell body
  for(let y=5;y<11;y++) for(let x=2;x<10;x++) bp(x,y,shell);
  for(let y=6;y<10;y++) for(let x=3;x<9;x++) bp(x,y,shellD);
  // Shell pattern
  bp(5,7,'#388E3C');bp(6,7,'#388E3C');bp(4,8,'#388E3C');bp(7,8,'#388E3C');
  // Arms
  bp(1,6,skin);bp(1,7,skin);bp(10,6,skin);bp(10,7,skin);
  // Wheelchair
  for(let x=1;x<11;x++) bp(x,11,frame);
  bp(1,12,frame);bp(2,12,frame);bp(9,12,frame);bp(10,12,frame);
  // Wheels
  bp(0,13,'#666');bp(1,13,'#666');bp(2,13,'#666');
  bp(9,13,'#666');bp(10,13,'#666');bp(11,13,'#666');
  bp(0,14,'#444');bp(1,14,'#888');bp(2,14,'#444');
  bp(9,14,'#444');bp(10,14,'#888');bp(11,14,'#444');

  // Loading animation
  const bar = document.getElementById('mtBar');
  const log = document.getElementById('mtLog');
  const loading = document.getElementById('mt-loading');
  const logs = [
    'Initialisation du systeme orbital...',
    'Chargement des 7 etages...',
    'Scan des 47 agents...',
    'Calibration isometrique...',
    'Activation des boss fights...',
    'Synchronisation des poles R-F-D...',
    'MOON TOWER operationnelle.'
  ];
  let pct = 0, logIdx = 0;
  function tick(){
    pct += 6 + Math.random() * 10;
    if(pct > 100) pct = 100;
    bar.style.width = pct + '%';
    if(logIdx < logs.length && pct > (logIdx+1) * 14){
      log.textContent = logs[logIdx++];
    }
    if(pct < 100){
      setTimeout(tick, 140 + Math.random() * 200);
    } else {
      log.textContent = logs[logs.length-1];
      setTimeout(()=>{
        loading.classList.add('fade-out');
        setTimeout(()=>loading.remove(), 800);
      }, 600);
    }
  }
  tick();
})();

function resize(){
  W=canvas.width=innerWidth;H=canvas.height=innerHeight;
  ctx.imageSmoothingEnabled=false;
  // Recalculate tower config on resize
  recalcTower();
}
addEventListener('resize',resize);

// ========== TOWER CONFIG (dynamic) ==========
let TOWER_W,TOWER_H,FLOOR_H,TAPER;
function recalcTower(){
  if(isMobile){
    // Mobile: tower fits within viewport with margin for agent names
    TOWER_W=Math.round(W*0.68);
    TOWER_H=Math.round(H*0.78);
    TAPER=0; // zero taper on mobile = perfectly straight tower
  }else{
    TOWER_W=340;
    TOWER_H=560;
    TAPER=12;
  }
  FLOOR_H=Math.floor(TOWER_H/7);
}
resize();

  ctx.fillRect(Math.floor(x/PX)*PX,Math.floor(y/PX)*PX,Math.floor(w/PX)*PX||PX,Math.floor(h/PX)*PX||PX)}

// ========== COLOR UTILS ==========
function hex2rgb(h){let v=parseInt(h.slice(1),16);return[(v>>16)&255,(v>>8)&255,v&255]}
function lighten(h,a){let[r,g,b]=hex2rgb(h);return`rgb(${Math.min(255,r+255*a)|0},${Math.min(255,g+255*a)|0},${Math.min(255,b+255*a)|0})`}
function darken(h,a){let[r,g,b]=hex2rgb(h);return`rgb(${r*a|0},${g*a|0},${b*a|0})`}

// ========== DRAW STARFIELD ==========
function drawStars(){
  stars.forEach(s=>{
    s.x-=s.speed;if(s.x<-10)s.x=W+10;
    let sx=((s.x%W)+W)%W,sy=((s.y%H)+H)%H;
    let twinkle=0.3+Math.sin(frame*0.02+s.bright*20)*0.3;
    ctx.globalAlpha=s.bright*twinkle;
    ctx.fillStyle=s.bright>0.7?'#fff':'#8899bb';
    ctx.fillRect(Math.floor(sx/PX)*PX,Math.floor(sy/PX)*PX,s.size>1.5?PX:PX*.7,s.size>1.5?PX:PX*.7);
    ctx.globalAlpha=1;
  });
}

// ========== AURORA ==========
function drawAurora(){
  let aY=H*0.04,aH=H*0.16;
  for(let i=0;i<4;i++){
    let off=Math.sin(frame*.005+i*1.5)*35;
    let wOff=Math.sin(frame*.008+i*.7)*20;
    let g=ctx.createLinearGradient(0,aY+off,0,aY+aH+off);
    let h1=(120+i*30+frame*.15)%360,h2=(180+i*25+frame*.1)%360;
    g.addColorStop(0,'transparent');
    g.addColorStop(.3,`hsla(${h1},80%,50%,0.02)`);
    g.addColorStop(.5,`hsla(${h2},70%,60%,0.035)`);
    g.addColorStop(.7,`hsla(${h1},80%,50%,0.02)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(0,aY+off);
    for(let x=0;x<=W;x+=30){let w=Math.sin(x*.005+frame*.01+i)*12+wOff;ctx.lineTo(x,aY+off+w)}
    ctx.lineTo(W,aY+aH+off);ctx.lineTo(0,aY+aH+off);ctx.closePath();ctx.fill();
  }
}

// ========== NEBULAE ==========
function drawNebulae(){

    let g=ctx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r);
    g.addColorStop(0,n.c);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(n.x*W-n.r,n.y*H-n.r,n.r*2,n.r*2);
  });
}

// ========== MOON ==========
function drawMoon(){
  let mx_=W*.88,my_=H*.11,mr=35;
  ctx.beginPath();ctx.arc(mx_,my_,mr,0,Math.PI*2);
  let mg=ctx.createRadialGradient(mx_-6,my_-6,2,mx_,my_,mr);
  mg.addColorStop(0,'#f0e8d0');mg.addColorStop(.7,'#d4c8a8');mg.addColorStop(1,'#b0a080');
  ctx.fillStyle=mg;ctx.fill();
  // Shadow crescent
  ctx.beginPath();ctx.arc(mx_+12,my_-3,mr*.9,0,Math.PI*2);
  ctx.fillStyle='rgba(5,5,16,0.85)';ctx.fill();
  // Craters
  [[-15,-8,4],[-20,4,3],[-8,10,3]].forEach(([dx,dy,cr])=>{
    ctx.beginPath();ctx.arc(mx_+dx,my_+dy,cr,0,Math.PI*2);
    ctx.fillStyle='rgba(160,140,100,0.3)';ctx.fill()});
  // Glow
  ctx.beginPath();ctx.arc(mx_,my_,mr+12,0,Math.PI*2);
  let gg=ctx.createRadialGradient(mx_,my_,mr,mx_,my_,mr+12);
  gg.addColorStop(0,'rgba(240,232,208,0.06)');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.fill();
}

// ========== PLANETS ==========
function drawPlanets(){
  planets.forEach(p=>{
    let px_=p.x*W,py_=p.y*H;
    let bob=Math.sin(frame*.008+p.x*10)*5;
    py_+=bob;
    // Glow
    ctx.beginPath();ctx.arc(px_,py_,p.r+8,0,Math.PI*2);
    let pg=ctx.createRadialGradient(px_,py_,p.r*.5,px_,py_,p.r+8);
    pg.addColorStop(0,p.color+'30');pg.addColorStop(1,'transparent');
    ctx.fillStyle=pg;ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(px_,py_,p.r,0,Math.PI*2);
    let bg=ctx.createRadialGradient(px_-p.r*.3,py_-p.r*.3,1,px_,py_,p.r);
    bg.addColorStop(0,lighten(p.color,.15));bg.addColorStop(1,darken(p.color,.5));
    ctx.fillStyle=bg;ctx.fill();
    // Ring
    if(p.ring){
      ctx.beginPath();ctx.ellipse(px_,py_,p.r*1.6,p.r*.3,.2,0,Math.PI*2);
      ctx.strokeStyle=p.color+'40';ctx.lineWidth=2;ctx.stroke();
    }
    // Label
    ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillStyle=p.color;ctx.globalAlpha=.5;
    ctx.fillText(p.name,px_,py_+p.r+14);ctx.globalAlpha=1;
  });
}

// ========== OCEAN ==========
function drawOcean(){
  let oY=TOWER_Y()+TOWER_H+25;
  let cols=['#0a1428','#0c1832','#0e1c3c','#101f40','#122348'];
  for(let l=0;l<5;l++){
    let y=oY+l*18;
    for(let x=0;x<W;x+=PX){
      let w=Math.sin((x+frame*.5+l*30)*.02)*7;
      if(y+w<H)pxRect(x,y+w,PX,H-y-w,cols[l]);
    }
  }
  // Foam
  for(let x=0;x<W;x+=PX*3){
    let w=Math.sin((x+frame*.5)*.02)*7;
    let s=Math.sin(x*.137+frame*.031)*.5+.5;
    if(s<.25){
      let a=.08+Math.sin(x*.27+frame*.017)*.08;
      px(x,oY+w,`rgba(255,255,255,${a.toFixed(2)})`);
    }
  }
}

// ========== TOWER REFLECTION ==========
function drawReflection(){
  let tx=TOWER_X(),ty=TOWER_Y(),oY=ty+TOWER_H+25;
  ctx.save();ctx.globalAlpha=.06;
  for(let f=0;f<7;f++){
    let fy=ty+(6-f)*FLOOR_H,fw=TOWER_W-f*TAPER,fx=tx+(TOWER_W-fw)/2;
    let mirY=oY+(oY-fy-FLOOR_H);
    let dist=Math.sin(frame*.03+f)*3;
    if(mirY<H&&mirY>oY){
      let bc=f>=6?'#7B2FF7':f>=4?'#00D4FF':f>=2?'#FF6B35':'#00FF88';
      ctx.fillStyle=bc;
      pxRect(fx+dist,mirY,fw,Math.min(FLOOR_H*.4,H-mirY),bc);
    }
  }
  ctx.restore();
}

// ========== DRAW TOWER ==========
function drawTower(){
  let tx=TOWER_X(),ty=TOWER_Y();

  // Tower shadow (skip on mobile for cleaner look)
  if(!isMobile){ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(tx+8,ty+8,TOWER_W,TOWER_H);}

  for(let f=0;f<7;f++){
    let fy=ty+(6-f)*FLOOR_H,fw=TOWER_W-f*TAPER,fx=tx+(TOWER_W-fw)/2;
    let bg_=f>=6?'#10042a':f>=4?'#041828':f>=2?'#281005':'#082818';
    let bc=f>=6?'#7B2FF7':f>=4?'#00D4FF':f>=2?'#FF6B35':'#00FF88';

    // Floor BG with subtle gradient
    let floorGrad=ctx.createLinearGradient(fx,fy,fx,fy+FLOOR_H);
    floorGrad.addColorStop(0,bg_);
    let[br,bg2,bb]=hex2rgb(bc);
    floorGrad.addColorStop(1,`rgba(${br},${bg2},${bb},0.06)`);
    ctx.fillStyle=floorGrad;ctx.fillRect(fx,fy,fw,FLOOR_H-2);

    // Glow pulse — subtle on mobile too for atmosphere
    let gI=isMobile?.025+Math.sin(frame*.02+f)*.015:.04+Math.sin(frame*.02+f)*.025;
    ctx.fillStyle=`rgba(${br},${bg2},${bb},${gI})`;
    ctx.fillRect(fx,fy,fw,FLOOR_H-2);

    // Border — glowing colored border
    ctx.strokeStyle=bc;ctx.lineWidth=isMobile?1.5:1;
    ctx.strokeRect(fx,fy,fw,FLOOR_H-2);

    // Thin separator line at top of floor
    ctx.fillStyle=`rgba(${br},${bg2},${bb},0.15)`;
    ctx.fillRect(fx,fy,fw,1);

    // Windows — smaller on mobile, bigger on desktop
    if(!isMobile){
      for(let w=0;w<Math.floor(fw/28);w++){
        let wx=fx+12+w*28,wy=fy+14;
        let lit=Math.sin(frame*.03+w+f*2)>-0.3;
        pxRect(wx,wy,10,14,lit?`rgba(255,255,200,0.18)`:'rgba(0,0,0,0.25)');
        if(lit){ctx.fillStyle='rgba(255,240,180,0.04)';ctx.fillRect(wx-2,wy+14,14,4);}
      }
    }else{
      // Mobile: tiny window dots for texture
      let winCount=Math.floor(fw/18);
      for(let w=0;w<winCount;w++){
        let wx=fx+6+w*18,wy=fy+FLOOR_H*0.2;
        let lit=Math.sin(frame*.03+w+f*2)>-0.2;
        if(lit) ctx.fillStyle=`rgba(255,255,200,0.12)`;
        else ctx.fillStyle='rgba(0,0,0,0.2)';
        ctx.fillRect(wx,wy,4,6);
      }
    }

    // Floor label (desktop only — saves space on mobile)
    if(!isMobile){
      ctx.fillStyle=bc;ctx.font='8px monospace';ctx.textAlign='left';
      ctx.fillText(`LV${f}`,fx+3,fy+10);
    }

    // Cables between floors (desktop only)
    if(f<6&&!isMobile){
      let nfw=TOWER_W-(f+1)*TAPER,nfx=tx+(TOWER_W-nfw)/2;
      for(let ci=0;ci<3;ci++){
        let t_=(ci+1)/4;
        let cx1=fx+fw*t_,cx2=nfx+nfw*t_;
        let pulse=Math.sin(frame*.06+ci*2.1+f*1.3)*.5+.5;
        ctx.beginPath();ctx.moveTo(cx1,fy);ctx.lineTo(cx2,fy-2);
        ctx.strokeStyle=bc;ctx.lineWidth=1;ctx.globalAlpha=.12+pulse*.2;ctx.stroke();
        // Pulse dot
        let dt=(frame*.02+ci*.33+f*.5)%1;
        ctx.beginPath();ctx.arc(cx1+(cx2-cx1)*dt,fy-2*dt,2,0,Math.PI*2);
        ctx.fillStyle=bc;ctx.globalAlpha=.3+pulse*.4;ctx.fill();
        ctx.globalAlpha=1;
      }
    }
  }

  // Door — entrance to the tower
  let baseY=ty+6*FLOOR_H;
  let dw=isMobile?18:22,dh=isMobile?28:34;
  let dx=tx+TOWER_W/2-dw/2,dy=baseY+FLOOR_H-2-dh;
  pxRect(dx,dy,dw,dh,'#0a2a15');
  let dp=.35+Math.sin(frame*.02)*.15;
  let doorGrad=ctx.createLinearGradient(dx,dy,dx,dy+dh);
  doorGrad.addColorStop(0,`rgba(255,255,180,${dp*0.3})`);
  doorGrad.addColorStop(1,`rgba(255,255,180,${dp})`);
  ctx.fillStyle=doorGrad;ctx.fillRect(dx+PX,dy+PX,dw-PX*2,dh-PX);
  // Light spill
  let sg=ctx.createRadialGradient(dx+dw/2,baseY+FLOOR_H-2,2,dx+dw/2,baseY+FLOOR_H+10,isMobile?25:35);
  sg.addColorStop(0,`rgba(255,255,200,${dp*.2})`);sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.fillRect(dx-15,baseY+FLOOR_H-4,dw+30,22);

  // Spire
  let spireH=isMobile?18:25;
  let sx=tx+TOWER_W/2,sy=ty-spireH;
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-14,ty);ctx.lineTo(sx+14,ty);ctx.closePath();
  let spireGrad=ctx.createLinearGradient(sx,sy,sx,ty);
  spireGrad.addColorStop(0,'#7B2FF7');spireGrad.addColorStop(1,'#12052a');
  ctx.fillStyle=spireGrad;ctx.fill();
  ctx.strokeStyle='#7B2FF7';ctx.lineWidth=1;ctx.stroke();
  // Beacon — pulsing glow
  let br=2.5+Math.sin(frame*.05)*1.5;
  ctx.beginPath();ctx.arc(sx,sy,br,0,Math.PI*2);ctx.fillStyle='#B18CFF';ctx.fill();
  ctx.beginPath();ctx.arc(sx,sy,br+8,0,Math.PI*2);
  ctx.fillStyle=`rgba(123,47,247,${.15+Math.sin(frame*.05)*.1})`;ctx.fill();
  // Beacon rays on mobile for visibility
  if(isMobile){
    let rayAlpha=.08+Math.sin(frame*.04)*.05;
    ctx.strokeStyle=`rgba(123,47,247,${rayAlpha})`;ctx.lineWidth=1;
    for(let r=0;r<4;r++){
      let angle=r*Math.PI/2+frame*.01;
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.lineTo(sx+Math.cos(angle)*20,sy+Math.sin(angle)*20);ctx.stroke();
    }
  }
  // AICO label
  ctx.font=`bold ${isMobile?10:7}px monospace`;ctx.textAlign='center';
  ctx.fillStyle='#B18CFF';ctx.fillText('AICO',sx,sy-8);
  // Antenna + Flag (desktop only)
  if(!isMobile){
    pxRect(sx-PX/2,sy-25,PX,20,'#4a3a6a');
    ctx.save();ctx.translate(sx,sy-25);ctx.rotate(frame*.008);
    pxRect(-16,-PX/2,32,PX,'#6a5a8a');
    ctx.beginPath();ctx.arc(-16,0,3,0,Math.PI*2);ctx.arc(16,0,3,0,Math.PI*2);
    ctx.fillStyle='#8a7aaa';ctx.fill();
    ctx.restore();
    let flagPh=Math.sin(frame*.04)*3;
    ctx.fillStyle='#7B2FF7';
    ctx.beginPath();ctx.moveTo(sx+14,ty-5);ctx.lineTo(sx+32,ty-12+flagPh);
    ctx.lineTo(sx+32,ty+flagPh);ctx.lineTo(sx+14,ty+5);ctx.closePath();ctx.fill();
    ctx.font='bold 7px monospace';ctx.textAlign='center';
    ctx.fillStyle='#fff';ctx.fillText('AICO',sx+23,ty-2+flagPh*.5);
  }

  // ========== BOSSES (desktop only — too cluttered on mobile) ==========
  hoveredBoss=null;
  if(isMobile)return;
  Object.entries(BOSSES).forEach(([fk,boss])=>{
    let fi=+fk,bfy=ty+(6-fi)*FLOOR_H+FLOOR_H/2;
    let bfw=TOWER_W-fi*TAPER,bfx=tx+(TOWER_W-bfw)/2;
    let bx_=bfx+bfw+18;
    if(boss.defeated){
      ctx.fillStyle='#00FF88';ctx.font='14px serif';ctx.textAlign='left';
      ctx.fillText('✅',bx_,bfy+5);
    }else{
      ctx.fillStyle='#FF3366';ctx.font='14px serif';ctx.textAlign='left';
      ctx.fillText('💀',bx_,bfy+5);
      let p2=Math.sin(frame*.05)*.3+.5;
      ctx.beginPath();ctx.arc(bx_+7,bfy,13,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,51,102,${p2*.25})`;ctx.fill();
    }
    if(Math.abs(mouseX-(bx_+7))<18&&Math.abs(mouseY-bfy)<18){
      hoveredBoss={...boss,floor:fi};
      ctx.beginPath();ctx.arc(bx_+7,bfy,18,0,Math.PI*2);
      ctx.strokeStyle=boss.defeated?'#00FF88':'#FF3366';ctx.lineWidth=1;ctx.stroke();
    }
  });
}

// ========== DRAW PIXEL AVATAR (Neo-Iso HD) ==========
function drawAgent(agent){
  let tx=TOWER_X(),ty=TOWER_Y();
  let fw=TOWER_W-agent.floor*TAPER,fx=tx+(TOWER_W-fw)/2;
  let fy=ty+(6-agent.floor)*FLOOR_H;
  let agentsOnFloor=AGENTS.filter(a=>a.floor===agent.floor).length;
  let spacing=fw/(agentsOnFloor+1);
  let ax=fx+spacing*(agent.pos+1);
  let ay=fy+FLOOR_H/2+8;

  // Hover/touch detection — larger hit area on mobile for finger taps
  let dist=Math.hypot(mouseX-ax,mouseY-ay);
  let hitRadius=isMobile?28:18;
  let isH=dist<hitRadius;
  if(isH)hoveredAgent=agent;

  let sc=isH?1.2:1;
  let sz=(isMobile?18:20)*sc;
  let bob=Math.sin(frame*.03+agent.pos*2.5+agent.floor*1.7)*1.5*sc;
  let by_=ay+bob;

  // Ground shadow (tinted purple)
  ctx.beginPath();ctx.ellipse(ax,by_+sz*.65,sz*.4,sz*.12,0,0,Math.PI*2);
  ctx.fillStyle='rgba(20,10,40,0.45)';ctx.fill();

  // Legs
  let walk=Math.sin(frame*.04+agent.pos*5)*1*sc;
  ctx.fillStyle=darken(agent.shirt,.5);
  pxRect(ax-sz*.12,by_+sz*.35+walk*.2,sz*.1,sz*.28,darken(agent.shirt,.5));
  pxRect(ax+sz*.03,by_+sz*.35-walk*.2,sz*.1,sz*.28,darken(agent.shirt,.5));

  // Torso
  ctx.fillStyle=agent.shirt;
  pxRect(ax-sz*.25,by_+sz*.05,sz*.5,sz*.35,agent.shirt);
  // Highlight
  pxRect(ax-sz*.23,by_+sz*.07,sz*.15,sz*.12,lighten(agent.shirt,.08));

  // Arms
  pxRect(ax-sz*.32,by_+sz*.08,sz*.08,sz*.24,agent.shirt);
  pxRect(ax+sz*.24,by_+sz*.08,sz*.08,sz*.24,agent.shirt);

  // Head
  pxRect(ax-sz*.17,by_-sz*.22,sz*.34,sz*.3,'#e8c9a0');
  // Hair
  pxRect(ax-sz*.2,by_-sz*.3,sz*.4,sz*.12,agent.hair);
  pxRect(ax-sz*.2,by_-sz*.25,PX,sz*.18,agent.hair);

  // Eyes
  let blink=Math.sin(frame*.01+agent.floor*7+agent.pos*11);
  let eH=blink>.97?PX*.3:PX;
  ctx.fillStyle='#1a1428';
  pxRect(ax-sz*.08,by_-sz*.1,PX*.8,eH,'#1a1428');
  pxRect(ax+sz*.04,by_-sz*.1,PX*.8,eH,'#1a1428');
  if(blink<=.97){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    pxRect(ax-sz*.07,by_-sz*.12,PX*.4,PX*.4,'rgba(255,255,255,0.5)');
  }

  // GOV badge
  if(agent.gov){
    ctx.fillStyle='#f0d060';
    ctx.beginPath();ctx.arc(ax+sz*.25,by_-sz*.25,sz*.07,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a1a00';ctx.font=`bold ${sz*.08}px monospace`;ctx.textAlign='center';
    ctx.fillText('G',ax+sz*.25,by_-sz*.22);
  }

  // NEW badge
  if(agent.isNew){
    let glow=.6+Math.sin(frame*.06)*.3;
    ctx.fillStyle=`rgba(34,197,94,${glow})`;
    ctx.beginPath();ctx.arc(ax-sz*.25,by_-sz*.28,sz*.08,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a2a0a';ctx.font=`bold ${sz*.07}px monospace`;ctx.textAlign='center';
    ctx.fillText('N',ax-sz*.25,by_-sz*.25);
  }

  // Hover glow
  if(isH){
    ctx.save();ctx.shadowColor=agent.color;ctx.shadowBlur=20;
    ctx.strokeStyle=agent.color;ctx.lineWidth=1;ctx.globalAlpha=.5;
    ctx.strokeRect(ax-sz*.3,by_-sz*.35,sz*.6,sz*1.05);
    ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();
  }

  // Name — bigger on mobile for readability
  let nameSz=isMobile?(isH?10:8):(isH?10:7);
  ctx.font=`bold ${nameSz}px monospace`;ctx.textAlign='center';
  ctx.fillStyle=isH?'#fff':agent.color;ctx.globalAlpha=isH?1:.8;
  ctx.fillText(agent.n,ax,by_-sz*.38);ctx.globalAlpha=1;

  return{x:ax,y:ay};
}

// ========== BINOME LINES ==========
function drawBinomes(agentPositions){
  BINOMES.forEach(([a,b])=>{
    let pa=agentPositions[a],pb=agentPositions[b];
    if(!pa||!pb)return;
    let pulse=Math.sin(frame*.04+a.length)*.3+.5;
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
    ctx.strokeStyle=`rgba(123,47,247,${.05+pulse*.08})`;ctx.lineWidth=1;ctx.stroke();
    // Pulse dot
    let dt=(frame*.015+a.length*.2)%1;
    ctx.beginPath();ctx.arc(pa.x+(pb.x-pa.x)*dt,pa.y+(pb.y-pa.y)*dt,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(123,47,247,${.2+pulse*.3})`;ctx.fill();
  });
}

// ========== FIREFLIES ==========
function drawFireflies(){
  fireflies.forEach(f=>{
    f.x+=Math.sin(f.phase+frame*.01)*f.speed;
    f.y+=Math.cos(f.phase*1.3+frame*.008)*f.speed*.7;
    if(f.x<0)f.x=W;if(f.x>W)f.x=0;
    let a=.15+Math.sin(frame*.02+f.phase)*.1;
    ctx.beginPath();ctx.arc(f.x,f.y,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,255,150,${a})`;ctx.fill();
    ctx.beginPath();ctx.arc(f.x,f.y,5,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,255,150,${a*.2})`;ctx.fill();
  });
}

// ========== SHOOTING STARS ==========
function updateShootingStars(){
  if(Math.random()<.005)shootingStars.push({x:Math.random()*W,y:Math.random()*H*.3,
    vx:3+Math.random()*4,vy:1+Math.random()*2,life:1});
  shootingStars=shootingStars.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life-=.02;
    if(s.life<=0)return false;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*4,s.y-s.vy*4);
    ctx.strokeStyle=`rgba(255,255,255,${s.life*.5})`;ctx.lineWidth=1.5;ctx.stroke();
    return true;
  });
}

// ========== INFO PANEL ==========
function showInfoPanel(agent){
  let panel=document.getElementById('info-panel');
  let content=document.getElementById('info-content');
  let stats=STATS[agent.n]||{atk:50,def:50,spd:50,int:50,cre:50};
  let poleMap={core:'OMEGA-CORE',recon:'PÔLE R — RECON',forge:'PÔLE F — FORGE',deploy:'PÔLE D — DEPLOY'};
  let poleBg={core:'#2a1040',recon:'#0a1a2a',forge:'#2a1205',deploy:'#0a2a15'};

  content.innerHTML=`
    <div class="agent-name" style="color:${agent.color}">${agent.n}${agent.isNew?'<span style="color:#22c55e;font-size:12px;margin-left:8px">NEW</span>':''}</div>
    <div class="agent-role">${agent.r}</div>
    <div class="pole-badge" style="background:${poleBg[agent.pole]};color:${agent.color};border:1px solid ${agent.color}40">${poleMap[agent.pole]}</div>
    <div class="agent-quote">"${agent.quote}"</div>
    <div style="margin:12px 0;font-size:10px;color:#666;letter-spacing:1px">STATISTIQUES</div>
    ${['ATK','DEF','SPD','INT','CRE'].map((s,i)=>{
      let val=[stats.atk,stats.def,stats.spd,stats.int,stats.cre][i];
      let colors=['#FF6B35','#00D4FF','#00FF88','#7B2FF7','#FF3366'];
      return`<div class="stat-row"><span class="stat-label">${s}</span>
        <div class="stat-bar"><div class="stat-fill" style="width:${val}%;background:${colors[i]}"></div></div>
        <span class="stat-val" style="color:${colors[i]}">${val}</span></div>`;
    }).join('')}
    <div style="margin:12px 0;font-size:10px;color:#666;letter-spacing:1px">COMPÉTENCES</div>
    <div class="skills-list">${agent.skills.map(s=>`<span>${s}</span>`).join('')}</div>
    <div style="margin-top:14px;font-size:10px;color:#444">Floor ${agent.floor} · ${agent.gov?'Gouverneur ·':''} Clic pour fermer</div>
  `;
  panel.classList.add('show');
}

function closeInfoPanel(){document.getElementById('info-panel').classList.remove('show')}

// ========== BOSS TOOLTIP ==========
function drawBossTooltip(){
  if(!hoveredBoss)return;
  let b=hoveredBoss;
  ctx.save();
  let tx_=mouseX+15,ty_=mouseY-10;
  let tw=220,th=60;
  // Glass card
  ctx.fillStyle='rgba(8,6,18,0.92)';
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(tx_,ty_,tw,th,8);else ctx.rect(tx_,ty_,tw,th);
  ctx.fill();
  ctx.strokeStyle=b.defeated?'#00FF88':'#FF3366';ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(tx_,ty_,tw,th,8);else ctx.rect(tx_,ty_,tw,th);
  ctx.stroke();
  ctx.font='bold 12px monospace';ctx.textAlign='left';
  ctx.fillStyle=b.defeated?'#00FF88':'#FF3366';
  ctx.fillText(b.name,tx_+10,ty_+18);
  ctx.font='11px monospace';ctx.fillStyle='#888';
  ctx.fillText(b.desc,tx_+10,ty_+34);
  ctx.fillStyle='#f0d060';ctx.font='bold 11px monospace';
  ctx.fillText(`Reward: ${b.reward} XP`,tx_+10,ty_+50);
  ctx.fillStyle=b.defeated?'#00FF88':'#FF3366';
  ctx.fillText(b.defeated?'VAINCU':'ACTIF',tx_+tw-55,ty_+18);
  ctx.restore();
}

// ========== PROGRESS BAR ==========
function updateProgress(){
  let defeated=Object.values(BOSSES).filter(b=>b.defeated).length;
  let total=Object.keys(BOSSES).length;
  let pct=Math.round(defeated/total*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

// ========== MAIN RENDER ==========
let lastRender=0;
const TARGET_FPS=isMobile?30:60;
const FRAME_BUDGET=1000/TARGET_FPS;

function render(timestamp){
  // Throttle to target FPS on mobile
  if(isMobile&&timestamp-lastRender<FRAME_BUDGET){requestAnimationFrame(render);return;}
  lastRender=timestamp;
  frame++;
  ctx.clearRect(0,0,W,H);

  // BG — subtle gradient everywhere for depth
  if(isMobile){
    let mbg=ctx.createRadialGradient(W/2,H*.35,0,W/2,H*.35,W*.9);
    mbg.addColorStop(0,'#0a0820');mbg.addColorStop(.6,'#060514');mbg.addColorStop(1,'#030310');
    ctx.fillStyle=mbg;ctx.fillRect(0,0,W,H);
  }else{
    let bg=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,W*.8);
    bg.addColorStop(0,'#0a0820');bg.addColorStop(1,'#050510');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  }

  // Desktop-only cosmetic layers
  if(!isMobile){drawNebulae();drawAurora();drawPlanets();drawFireflies();}
  // Stars — reduced on mobile, full on desktop
  drawStars();
  // Moon — desktop only (takes space on mobile)
  if(!isMobile)drawMoon();
  if(!isMobile)updateShootingStars();
  if(!isMobile)drawOcean();
  if(!isMobile)drawReflection();

  drawTower();

  // Draw agents
  hoveredAgent=null;
  let positions={};
  AGENTS.forEach(a=>{let p=drawAgent(a);positions[a.n]=p});
  if(!isMobile)drawBinomes(positions);
  if(!isMobile)drawBossTooltip();

  requestAnimationFrame(render);
}

canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('click',e=>{
  if(hoveredAgent)showInfoPanel(hoveredAgent);
  else if(!hoveredBoss)closeInfoPanel();
});
// Mobile touch support
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  let t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  let t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(hoveredAgent)showInfoPanel(hoveredAgent);
  else if(!hoveredBoss)closeInfoPanel();
});

updateProgress();
render();
</script>
