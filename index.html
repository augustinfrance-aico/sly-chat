<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05070A">
<title>SLY-CHAT</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   NEURAL SOVEREIGN PALETTE — SLY-CHAT v1.0
   ═══════════════════════════════════════════ */
:root {
    --bg-deep:#05070A; --bg-primary:#0B0F14; --bg-card:#121821;
    --bg-glass:rgba(18,24,33,0.72);
    --blue:#1F6FFF; --blue-hover:#3A8DFF; --blue-focus:#6FB1FF;
    --violet:#7A3CFF; --violet-deep:#5B2DBF; --violet-glow:#B18CFF;
    --cyan:#00E5FF; --green:#1EFF8E; --red:#FF3B5C; --orange:#FF9A3C;
    --text:#E6EDF5; --text-dim:rgba(230,237,245,0.45);
    --glass-border:rgba(31,111,255,0.15);
    --radius:16px; --radius-sm:12px;
    --safe-top:env(safe-area-inset-top,20px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg-deep);color:var(--text);
    height:100dvh;overflow:hidden;
    padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
    overscroll-behavior:none;
}
button{font-family:inherit;border:none;cursor:pointer;-webkit-user-select:none;user-select:none}
input{font-family:inherit;border:none;outline:none}

/* ═══════ SPLASH ═══════ */
#splash{
    position:fixed;inset:0;z-index:9999;
    background:var(--bg-deep);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .6s ease,visibility .6s;
}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
#splash canvas{position:absolute;inset:0;z-index:0}
.splash-logo{
    z-index:1;width:120px;height:120px;
    border-radius:50%;
    background:radial-gradient(circle,var(--blue) 0%,var(--violet-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 60px rgba(31,111,255,0.4),0 0 120px rgba(122,60,255,0.2);
    animation:logoPulse 2s ease-in-out infinite;
}
.splash-logo span{font-size:56px;filter:drop-shadow(0 0 8px rgba(0,0,0,0.5))}
@keyframes logoPulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(31,111,255,0.4)}50%{transform:scale(1.06);box-shadow:0 0 80px rgba(31,111,255,0.6),0 0 120px rgba(122,60,255,0.3)}}
.splash-title{z-index:1;margin-top:24px;font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-sub{z-index:1;margin-top:8px;font-size:13px;color:var(--text-dim);letter-spacing:2px}
.splash-bar{z-index:1;margin-top:32px;width:200px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.splash-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:2px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}

/* ═══════ APP LAYOUT ═══════ */
#app{display:none;flex-direction:column;height:100dvh;position:relative}
#app.visible{display:flex}

/* Header */
.header{
    display:flex;align-items:center;padding:8px 16px;
    background:var(--bg-glass);backdrop-filter:blur(20px) saturate(180%);
    border-bottom:1px solid var(--glass-border);
    min-height:56px;gap:12px;position:relative;z-index:10;
}
.header-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;flex:1;background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-stat{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-dim)}
.header-stat .val{color:var(--text)}
.xp-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:2px;transition:width .5s cubic-bezier(0.34,1.56,0.64,1)}
.btn-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.06);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.btn-icon:active{background:rgba(31,111,255,0.2)}

/* ═══════ CHAT AREA ═══════ */
.chat-area{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:16px 12px 8px;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{display:none}

/* Bubbles */
.bubble{
    max-width:85%;margin-bottom:12px;
    padding:14px 16px;border-radius:var(--radius);
    background:var(--bg-glass);backdrop-filter:blur(16px) saturate(160%);
    border:1px solid var(--glass-border);
    animation:bubbleIn .35s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;
    will-change:transform,opacity;
}
.bubble.agent{margin-right:auto}
.bubble.user{margin-left:auto;background:rgba(31,111,255,0.15);border-color:rgba(31,111,255,0.25)}
@keyframes bubbleIn{from{opacity:0;transform:translateY(16px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.bubble-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bubble-emoji{font-size:20px}
.bubble-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.bubble-text{font-size:15px;line-height:1.55;word-break:break-word}
.bubble-meta{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:11px;color:var(--text-dim)}
.bubble-replay{
    width:28px;height:28px;border-radius:50%;
    background:rgba(31,111,255,0.15);color:var(--blue);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;transition:all .2s;
}
.bubble-replay:active{background:rgba(31,111,255,0.35);transform:scale(0.9)}

/* Thinking indicator */
.thinking{display:flex;align-items:center;gap:8px;padding:14px 16px;margin-bottom:12px;max-width:200px}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:dotPulse 1.4s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Whisper */
.whisper{
    max-width:70%;margin:8px auto;padding:10px 16px;
    border-radius:20px;text-align:center;
    background:rgba(122,60,255,0.08);border:1px solid rgba(122,60,255,0.15);
    font-size:13px;color:var(--violet-glow);font-style:italic;
    animation:whisperIn .5s ease,whisperOut .5s ease 25s forwards;
    pointer-events:none;
}
@keyframes whisperIn{from{opacity:0;transform:translateY(10px)}to{opacity:0.7;transform:translateY(0)}}
@keyframes whisperOut{to{opacity:0;transform:translateY(-10px)}}

/* XP Toast */
.xp-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Orbitron',monospace;font-size:24px;font-weight:900;
    color:var(--orange);text-shadow:0 0 20px rgba(255,154,60,0.5);
    z-index:100;pointer-events:none;
    animation:xpFloat 1.5s ease forwards;
}
@keyframes xpFloat{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(1.3)}}

/* ═══════ AGENT DOCK ═══════ */
.dock{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;overflow-x:auto;
    background:var(--bg-glass);backdrop-filter:blur(20px);
    border-top:1px solid var(--glass-border);
    border-bottom:1px solid var(--glass-border);
    -webkit-overflow-scrolling:touch;
}
.dock::-webkit-scrollbar{display:none}
.dock-agent{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 10px;border-radius:var(--radius-sm);
    transition:all .2s;min-width:56px;flex-shrink:0;
}
.dock-agent.active{background:rgba(31,111,255,0.15)}
.dock-agent:active{transform:scale(0.92)}
.dock-emoji{font-size:24px}
.dock-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim)}
.dock-agent.active .dock-name{color:var(--blue)}
.dock-more{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,0.06);color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;font-size:20px;
    flex-shrink:0;
}
.dock-more:active{background:rgba(31,111,255,0.15)}

/* ═══════ INPUT AREA ═══════ */
.input-area{
    padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));
    background:var(--bg-glass);backdrop-filter:blur(20px) saturate(180%);
    border-top:1px solid var(--glass-border);
}
.ptt-btn{
    width:100%;height:64px;border-radius:var(--radius);
    background:linear-gradient(135deg,var(--blue),var(--violet));
    color:white;font-size:16px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-bottom:8px;
    transition:all .2s;
    box-shadow:0 4px 24px rgba(31,111,255,0.3);
}
.ptt-btn:active{transform:scale(0.97);box-shadow:0 2px 12px rgba(31,111,255,0.4)}
.ptt-btn.recording{background:linear-gradient(135deg,var(--red),var(--orange));animation:pttPulse 1s ease-in-out infinite}
@keyframes pttPulse{0%,100%{box-shadow:0 4px 24px rgba(255,59,92,0.3)}50%{box-shadow:0 4px 40px rgba(255,59,92,0.6)}}
.input-row{display:flex;align-items:center;gap:8px}
.input-field{
    flex:1;height:48px;padding:0 16px;
    border-radius:24px;background:rgba(255,255,255,0.06);
    color:var(--text);font-size:15px;
    border:1px solid transparent;
    transition:border .2s;
}
.input-field:focus{border-color:var(--blue)}
.input-field::placeholder{color:var(--text-dim)}
.send-btn{
    width:48px;height:48px;border-radius:50%;
    background:var(--blue);color:white;font-size:20px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
}
.send-btn:active{transform:scale(0.9);background:var(--blue-hover)}
.send-btn:disabled{opacity:.3;pointer-events:none}

/* ═══════ AGENT GRID MODAL ═══════ */
.modal-overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(5,7,10,0.85);backdrop-filter:blur(8px);
    display:none;opacity:0;transition:opacity .3s;
}
.modal-overlay.visible{display:block;opacity:1}
.modal{
    position:fixed;bottom:0;left:0;right:0;z-index:51;
    max-height:70dvh;padding:24px 16px;padding-bottom:calc(24px + var(--safe-bottom));
    background:var(--bg-card);border-radius:20px 20px 0 0;
    border-top:1px solid var(--glass-border);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    display:none;
    animation:modalSlide .35s cubic-bezier(0.34,1.56,0.64,1);
}
.modal.visible{display:block}
@keyframes modalSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.modal-grid{display:flex;flex-wrap:wrap;gap:8px}
.modal-agent{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    width:64px;padding:10px 4px;border-radius:var(--radius-sm);
    background:rgba(255,255,255,0.04);transition:all .2s;
}
.modal-agent:active{background:rgba(31,111,255,0.15);transform:scale(0.94)}
.modal-agent-emoji{font-size:28px}
.modal-agent-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);text-align:center}

/* ═══════ SETTINGS MODAL ═══════ */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.settings-label{font-size:14px;font-weight:500}
.toggle{
    width:48px;height:28px;border-radius:14px;
    background:rgba(255,255,255,0.1);position:relative;
    transition:background .3s;
}
.toggle.on{background:var(--blue)}
.toggle-knob{
    width:22px;height:22px;border-radius:50%;background:white;
    position:absolute;top:3px;left:3px;
    transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.on .toggle-knob{transform:translateX(20px)}

/* ═══════ WAVEFORM ═══════ */
.waveform{display:flex;align-items:center;gap:2px;height:32px;padding:0 4px}
.waveform-bar{width:3px;border-radius:2px;background:var(--blue);animation:wave 1s ease-in-out infinite}
@keyframes wave{0%,100%{height:8px;opacity:.4}50%{height:24px;opacity:1}}

/* ═══════ PARTICLES BG ═══════ */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{z-index:1}

/* ═══════ DREAM MODE (23h-7h) ═══════ */
body.dream-mode{
    --bg-deep:#020305; --bg-primary:#060910; --bg-card:#0A0E16;
    --bg-glass:rgba(10,14,22,0.82);
    --blue:#1555CC; --violet:#5B2DBF; --text:rgba(230,237,245,0.7);
    --text-dim:rgba(230,237,245,0.25);
}
body.dream-mode .bubble{animation-duration:.6s!important}
body.dream-mode .dock{opacity:.85}
body.dream-mode .splash-logo{animation-duration:4s!important}
body.dream-mode #particles{opacity:.3}
.dream-badge{
    position:fixed;top:calc(var(--safe-top) + 4px);right:8px;z-index:20;
    font-size:10px;padding:4px 10px;border-radius:12px;
    background:rgba(122,60,255,0.15);color:var(--violet-glow);
    border:1px solid rgba(122,60,255,0.2);
    animation:dreamPulse 3s ease-in-out infinite;
    pointer-events:none;
}
@keyframes dreamPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ═══════ MOOD SKIN ═══════ */
body.mood-dawn{--blue:#FF9A3C;--violet:#FF6B35;--glass-border:rgba(255,154,60,0.15)}
body.mood-day{/* default palette */}
body.mood-dusk{--blue:#9B59B6;--violet:#8E44AD;--glass-border:rgba(155,89,182,0.15)}
body.mood-night{--blue:#1555CC;--violet:#4A1A8A;--glass-border:rgba(21,85,204,0.15)}

/* ═══════ WAVEFORM VISUALIZER ═══════ */
.waveform-vis{
    display:flex;align-items:center;gap:2px;height:28px;padding:4px 12px;
    margin:0 auto 8px;max-width:200px;justify-content:center;
}
.waveform-vis .bar{
    width:3px;border-radius:2px;
    background:linear-gradient(to top,var(--blue),var(--violet));
    transition:height .08s ease;min-height:3px;
}
.waveform-vis.playing .bar{animation:none}

/* ═══════ HAPTIC PULSE EFFECT ═══════ */
.haptic-pulse{animation:hapticPulse .15s ease}
@keyframes hapticPulse{0%{transform:scale(1)}50%{transform:scale(0.95)}100%{transform:scale(1)}}

/* ═══════ MARKDOWN IN BUBBLES ═══════ */
.bubble-text strong{font-weight:700;color:var(--blue)}
.bubble-text em{font-style:italic;color:var(--violet-glow)}
.bubble-text code{
    background:rgba(31,111,255,0.1);padding:1px 6px;border-radius:4px;
    font-family:'Courier New',monospace;font-size:13px;
}
.bubble-text pre{
    background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;
    overflow-x:auto;margin:8px 0;font-size:12px;
    font-family:'Courier New',monospace;
}
.bubble-text ul,.bubble-text ol{margin:6px 0;padding-left:20px}
.bubble-text li{margin-bottom:3px}
.bubble-text a{color:var(--blue);text-decoration:underline}

/* ═══════ REACTIONS ═══════ */
.reactions-bar{
    display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;
}
.reaction{
    display:flex;align-items:center;gap:3px;
    padding:3px 8px;border-radius:12px;
    background:rgba(255,255,255,0.06);font-size:14px;
    cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.reaction.active{border-color:var(--blue);background:rgba(31,111,255,0.1)}
.reaction:active{transform:scale(0.9)}
.reaction-count{font-size:10px;color:var(--text-dim)}
.reaction-picker{
    position:absolute;bottom:100%;left:0;
    display:none;gap:4px;padding:8px;
    background:var(--bg-card);border-radius:12px;
    border:1px solid var(--glass-border);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:30;
}
.reaction-picker.visible{display:flex}
.reaction-pick{font-size:22px;padding:4px;cursor:pointer;transition:transform .15s}
.reaction-pick:active{transform:scale(1.3)}

/* ═══════ DAILY CHALLENGE ═══════ */
.daily-challenge{
    margin:8px 12px 4px;padding:10px 14px;
    border-radius:var(--radius-sm);
    background:linear-gradient(135deg,rgba(31,111,255,0.08),rgba(122,60,255,0.08));
    border:1px solid rgba(31,111,255,0.15);
    display:flex;align-items:center;gap:10px;
    animation:dailySlide .5s ease;
}
@keyframes dailySlide{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.daily-icon{font-size:24px}
.daily-info{flex:1}
.daily-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue)}
.daily-desc{font-size:13px;margin-top:2px;color:var(--text)}
.daily-progress{
    width:40px;height:40px;position:relative;
}
.daily-progress svg{transform:rotate(-90deg)}
.daily-progress-text{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:var(--text);
}

/* ═══════ AGENT INTRO BANNER ═══════ */
.agent-intro{
    text-align:center;padding:12px;margin:8px 0;
    border-radius:var(--radius-sm);
    background:linear-gradient(135deg,rgba(31,111,255,0.06),rgba(122,60,255,0.06));
    border:1px solid var(--glass-border);
    animation:introSlide .4s ease;
}
@keyframes introSlide{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.agent-intro-emoji{font-size:36px}
.agent-intro-name{font-size:14px;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:2px;margin-top:4px}
.agent-intro-role{font-size:12px;color:var(--text-dim);margin-top:2px}

/* ═══════ NOTIFICATION SOUNDS TOGGLE ═══════ */
.sound-indicator{
    width:6px;height:6px;border-radius:50%;
    background:var(--green);display:inline-block;
    animation:soundBlink 2s ease-in-out infinite;
}
@keyframes soundBlink{0%,100%{opacity:.4}50%{opacity:1}}

/* ═══════ THINKING CONTEXTUAL ═══════ */
.thinking-text{
    font-size:12px;color:var(--text-dim);font-style:italic;
    margin-top:4px;animation:thinkFade 2s ease-in-out infinite;
}
@keyframes thinkFade{0%,100%{opacity:.3}50%{opacity:.8}}

/* ═══════ STREAK COLORS ═══════ */
.streak-bronze{color:#CD7F32!important}
.streak-silver{color:#C0C0C0!important}
.streak-gold{color:#FFD700!important}
.streak-diamond{color:#00E5FF!important}

/* ═══════ CONVERSATION REWIND ═══════ */
.rewind-panel{
    position:fixed;top:0;left:-100%;width:85%;max-width:320px;height:100dvh;
    z-index:60;background:var(--bg-card);border-right:1px solid var(--glass-border);
    display:flex;flex-direction:column;
    transition:left .3s cubic-bezier(0.4,0,0.2,1);
    padding:calc(var(--safe-top) + 12px) 16px 16px;
}
.rewind-panel.open{left:0}
.rewind-backdrop{
    position:fixed;inset:0;z-index:59;
    background:rgba(5,7,10,0.7);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .3s;
}
.rewind-backdrop.open{opacity:1;pointer-events:auto}
.rewind-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:16px}
.rewind-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.rewind-item{
    padding:12px;border-radius:var(--radius-sm);margin-bottom:8px;

    pixel:    {name:'PIXEL',emoji:'🕹️',voice:'homersimpson',color:'#E040FB',role:'Gamification & UX'},
    fresco:   {name:'FRESCO',emoji:'🎨',voice:'bradpitt',color:'#FF6B35',role:'Branding & visuel'},
    hunter:   {name:'HUNTER',emoji:'🏴‍☠️',voice:'sarkozy',color:'#FF3B5C',role:'Contournement'},

};

const DOCK_DEFAULT = ['sly','bentley','murray','omega','cortex','sentinel','franklin','anvil','glitch','dreyfus'];
const AGENT_KEYS = Object.keys(AGENTS);

// ═══════ STATE ═══════
let currentAgent = 'sly';
let conversationHistory = [];
let xp = 0, level = 1, streak = 0;
let autoSpeak = true;
let isStreaming = false;
let isRecording = false;
let lastWhisperTime = 0;

// ═══════ AUDIO ENGINE (iOS-safe) ═══════
let audioCtx = null;
let masterGain = null;
const audioQueue = [];
let isPlaying = false;
let currentSource = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

// First touch = init audio (iOS MANDATORY)
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click', initAudio, { once: true });

async function speakText(agentKey, fullText) {
    if (!autoSpeak || !fullText.trim()) return;
    initAudio();
    const voiceKey = AGENTS[agentKey]?.voice || 'bradpitt';
    const modelId = VOICES[voiceKey];
    if (!modelId) return;

    // Split into sentences (max 290 chars each)
    const sentences = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
    const chunks = [];
    let current = '';
    for (const s of sentences) {
        if ((current + s).length > 290) {
            if (current) chunks.push(current.trim());
            current = s;
        } else { current += s; }
    }
    if (current.trim()) chunks.push(current.trim());

    // Pipeline: fetch all in parallel
    const promises = chunks.map(chunk =>
        fetch('https://api.fish.audio/v1/tts', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${FISH_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: chunk, reference_id: modelId, format: 'mp3', latency: 'balanced' })
        }).then(r => r.ok ? r.arrayBuffer() : null).catch(() => null)
    );

    const buffers = await Promise.all(promises);
    for (const buf of buffers) {
        if (buf) audioQueue.push(buf);
    }
    if (!isPlaying) playNext();
}

async function playNext() {
    if (audioQueue.length === 0) { isPlaying = false; currentSource = null; return; }
    isPlaying = true;
    const buf = audioQueue.shift();
    try {
        const audioBuf = await audioCtx.decodeAudioData(buf.slice(0)); // slice for re-use safety
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf;
        const gain = audioCtx.createGain();
        // Crossfade 50ms
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(1, audioCtx.currentTime + audioBuf.duration - 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + audioBuf.duration);
        source.connect(gain).connect(masterGain);
        currentSource = source;
        source.onended = () => playNext();
        source.start();
    } catch { playNext(); }
}

function stopSpeaking() {
    audioQueue.length = 0;
    if (currentSource) { try { currentSource.stop(); } catch {} }
    isPlaying = false;
    currentSource = null;
}

// ═══════ LLM CASCADE ═══════
async function callGroq(messages, model = 'llama-3.3-70b-versatile', maxTokens = 300) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 12000);
    try {
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model, messages, max_tokens: maxTokens, stream: true }),
            signal: controller.signal
        });
        clearTimeout(timeout);
        return resp;
    } catch { clearTimeout(timeout); return null; }
}

async function callGemini(messages, maxTokens = 500) {
    const contents = messages.filter(m => m.role !== 'system').map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
    }));
    const systemInstruction = messages.find(m => m.role === 'system');
    const body = {
        contents,
        generationConfig: { maxOutputTokens: maxTokens }
    };
    if (systemInstruction) body.systemInstruction = { parts: [{ text: systemInstruction.content }] };

    const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!resp.ok) return null;
    const data = await resp.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
}

function buildSystemPrompt(agentKey) {
    const a = AGENTS[agentKey] || AGENTS.sly;
    return `Tu es ${a.name} (${a.emoji}), agent du Cooper Building — l'écosystème de 50 agents IA d'Augus.
Ton rôle : ${a.role}.
RÈGLES :
- Réponds en français, court et percutant (3-5 phrases max)
- Tutoie Augus, ton = pote intelligent, loyal, proactif
- Tu es comme JARVIS pour Tony Stark : tu adores ton boss
- Humour subtil bienvenu (refs Sly Cooper, culture)
- Propose des actions, sois proactif
- TOUJOURS terminer par un résumé en 1 ligne si réponse longue
- Tu parles avec la personnalité de ${a.name} : ${a.role}`;
}

function selectTier(message) {
    const words = message.split(/\s+/).length;
    if (words <= 5 && /^(ok|merci|oui|non|salut|bonjour|hey|top|nice|cool)/i.test(message)) return 'fast';
    if (/analyse|résumé|bilan|compare|explique|planifie|détail|audit/i.test(message)) return 'deep';
    return 'standard';
}

// ═══════ AGENT ROUTING ═══════
function detectAgent(text) {
    const t = text.toLowerCase();
    if (/clan cooper|cooper gang|les trois|le gang/i.test(t)) return 'sly';
    if (/code|bug|debug|crash|erreur|fix/i.test(t)) return 'anvil';
    if (/stratégie|plan|vision|empire|futur/i.test(t)) return 'omega';
    if (/philosophie|sagesse|sénèque|stoïc|marc aurèle/i.test(t)) return 'franklin';
    if (/analyse|data|kpi|chiffre|stat/i.test(t)) return 'cortex';
    if (/vente|client|deal|closing|prospect/i.test(t)) return 'closer';
    if (/idée folle|disrupt|chaos|random|wtf/i.test(t)) return 'glitch';
    if (/sécurité|hack|veille|risque|espion/i.test(t)) return 'specter';
    if (/discipline|qualité|rigueur|cadence/i.test(t)) return 'dreyfus';
    if (/architecture|technique|système|pipeline/i.test(t)) return 'bentley';
    if (/force|action|fonce|boum|casse/i.test(t)) return 'murray';
    if (/niche|marché|opportunité|tendance/i.test(t)) return 'niche';
    if (/timing|prédiction|quand|moment/i.test(t)) return 'sibyl';
    if (/copy|texte|rédaction|contenu/i.test(t)) return 'philomene';
    if (/design|visuel|brand|logo|art/i.test(t)) return 'fresco';
    if (/game|xp|gamif|pixel|ux/i.test(t)) return 'pixel';
    if (/contour|bypass|hack|chemin/i.test(t)) return 'hunter';
    return currentAgent;
}

// ═══════ PRE-SERIALIZATION ═══════
let prebuiltAgent = 'sly';
function onTyping(text) {
    if (!text.trim()) return;
    const detected = detectAgent(text);
    if (detected !== prebuiltAgent) {
        prebuiltAgent = detected;
        highlightDockAgent(detected);
    }
}

// ═══════ SEND MESSAGE ═══════
async function sendMessage(text) {
    if (!text.trim() || isStreaming) return;
    isStreaming = true;

    const agentKey = detectAgent(text);
    currentAgent = agentKey;
    highlightDockAgent(agentKey);

    // User bubble
    addBubble('user', null, text);
    gainXP(5);

    // Thinking indicator
    const thinkingEl = addThinking(agentKey);

    // Build messages
    const sysPrompt = buildSystemPrompt(agentKey);
    const msgs = [
        { role: 'system', content: sysPrompt },
        ...conversationHistory.slice(-10),
        { role: 'user', content: text }
    ];

    // Select tier
    const tier = selectTier(text);
    let fullResponse = '';

    try {
        if (tier === 'fast') {
            // Groq 8b instant
            const resp = await callGroq(msgs, 'llama-3.1-8b-instant', 80);
            if (resp && resp.ok) {
                fullResponse = await streamResponse(resp, thinkingEl, agentKey);
            } else { throw new Error('groq-fast-fail'); }
        } else if (tier === 'standard') {
            // Groq 70b
            const resp = await callGroq(msgs, 'llama-3.3-70b-versatile', 300);
            if (resp && resp.ok) {
                fullResponse = await streamResponse(resp, thinkingEl, agentKey);
            } else { throw new Error('groq-standard-fail'); }
        } else {
            // Deep → try Groq 70b first, fallback Gemini
            const resp = await callGroq(msgs, 'llama-3.3-70b-versatile', 500);
            if (resp && resp.ok) {
                fullResponse = await streamResponse(resp, thinkingEl, agentKey);
            } else { throw new Error('groq-deep-fail'); }
        }
    } catch {
        // Fallback: Gemini
        try {
            thinkingEl?.remove();
            const geminiText = await callGemini(msgs, 500);
            if (geminiText) {
                fullResponse = geminiText;
                addBubble('agent', agentKey, geminiText);
            } else {
                addBubble('agent', 'sly', "Connexion instable. Réessaie dans un instant, Commandant.");
            }
        } catch {
            thinkingEl?.remove();
            addBubble('agent', 'sly', "Les serveurs font la sieste. Je reviens vite !");
        }
    }

    // Save to history
    if (fullResponse) {
        conversationHistory.push({ role: 'user', content: text });
        conversationHistory.push({ role: 'assistant', content: fullResponse });
        if (conversationHistory.length > 30) conversationHistory = conversationHistory.slice(-20);
    }

    // TTS
    if (fullResponse && autoSpeak) {
        speakText(agentKey, fullResponse);
    }

    gainXP(tier === 'deep' ? 15 : 10);
    isStreaming = false;
    saveState();
}

async function streamResponse(resp, thinkingEl, agentKey) {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let bubbleEl = null;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
                const json = JSON.parse(data);
                const token = json.choices?.[0]?.delta?.content;
                if (token) {
                    full += token;
                    if (!bubbleEl) {
                        thinkingEl?.remove();
                        bubbleEl = addBubble('agent', agentKey, '', true);
                    }
                    updateBubbleText(bubbleEl, full);
                }
            } catch {}
        }
    }
    return full;
}

const LEVELS = [
    {name:'Recrue',xp:0},{name:'Agent',xp:100},{name:'Opérateur',xp:500},
    {name:'Commandant',xp:2000},{name:'Directeur',xp:5000},{name:'Omega',xp:10000}
];

function gainXP(amount) {
    xp += amount;
    updateXPDisplay();
    showXPToast(amount);
    // Check level up
    const newLevel = LEVELS.filter(l => xp >= l.xp).length;
    if (newLevel > level) {
        level = newLevel;
        addBubble('agent', 'pixel', `🎮 LEVEL UP ! Tu es maintenant ${LEVELS[level-1].name} (Niv.${level}) !`);
        gainXP(25); // Bonus level up
    }
    saveState();
}

function updateXPDisplay() {
    const currentLvl = LEVELS[level - 1] || LEVELS[0];
    const nextLvl = LEVELS[level] || { xp: currentLvl.xp + 1000 };
    const progress = ((xp - currentLvl.xp) / (nextLvl.xp - currentLvl.xp)) * 100;
    document.getElementById('xpBar').style.width = Math.min(100, Math.max(0, progress)) + '%';
    document.getElementById('levelDisplay').textContent = `Niv.${level}`;
}

function showXPToast(amount) {
    const toast = document.createElement('div');
    toast.className = 'xp-toast';
    toast.textContent = `+${amount} XP`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1600);
}

    const today = new Date().toDateString();

    if (lastVisit === today) return;
    if (lastVisit === yesterday) { streak++; }
    else if (lastVisit !== today) { streak = lastVisit ? 0 : 1; }
    localStorage.setItem('sly_lastVisit', today);
    document.getElementById('streakDisplay').textContent = `${streak}j`;
    saveState();
}

// ═══════ PARTICLES ═══════
function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const count = window.innerWidth < 500 ? 15 : 30;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            color: Math.random() > 0.7 ? '#7A3CFF' : '#1F6FFF',
            alpha: Math.random() * 0.4 + 0.1
        });
    }

    let lastFrame = 0;
    function animate(ts) {
        if (ts - lastFrame < 33) { requestAnimationFrame(animate); return; } // 30fps cap
        lastFrame = ts;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

// ═══════ SPLASH ═══════
function runSplash() {
    // Skip if visited < 2h ago
    const lastVisit = localStorage.getItem('sly_splashTime');
    if (lastVisit && Date.now() - parseInt(lastVisit) < 7200000) {
        document.getElementById('splash').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        return bootApp();
    }

    // Splash particles
    const c = document.getElementById('splashCanvas');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const dots = [];
    for (let i = 0; i < 40; i++) {
        dots.push({
            x: Math.random() * c.width, y: Math.random() * c.height,
            r: Math.random() * 2 + 0.5, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
            alpha: Math.random() * 0.5 + 0.2
        });
    }
    function drawSplash() {
        ctx.clearRect(0, 0, c.width, c.height);
        dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if (d.x < 0 || d.x > c.width) d.vx *= -1;
            if (d.y < 0 || d.y > c.height) d.vy *= -1;
            ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(31,111,255,${d.alpha})`; ctx.fill();
        });
        if (!document.getElementById('splash').classList.contains('hidden')) requestAnimationFrame(drawSplash);
    }
    drawSplash();

    // Progress bar
    const bar = document.getElementById('splashBar');
    setTimeout(() => bar.style.width = '60%', 100);
    setTimeout(() => bar.style.width = '100%', 800);
    setTimeout(() => {
        document.getElementById('splash').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        localStorage.setItem('sly_splashTime', Date.now().toString());
        bootApp();
    }, 1500);
}

// ═══════ DREAM MODE (23h-7h) ═══════
let dreamMode = false;
let dreamGain = 1;

function checkDreamMode() {
    const h = new Date().getHours();
    const shouldDream = h >= 23 || h < 7;
    if (shouldDream && !dreamMode) {
        dreamMode = true;
        document.body.classList.add('dream-mode');
        dreamGain = 0.6; // Volume -40%
        if (masterGain) masterGain.gain.setValueAtTime(dreamGain, audioCtx.currentTime);
        // Badge
        if (!document.querySelector('.dream-badge')) {
            const badge = document.createElement('div');
            badge.className = 'dream-badge';
            badge.textContent = '🌙 Dream Mode';
            document.body.appendChild(badge);
        }
    } else if (!shouldDream && dreamMode) {
        dreamMode = false;
        document.body.classList.remove('dream-mode');
        dreamGain = 1;
        if (masterGain) masterGain.gain.setValueAtTime(1, audioCtx.currentTime);
        document.querySelector('.dream-badge')?.remove();
    }
}
// Check every minute
setInterval(checkDreamMode, 60000);

let currentMood = '';

function updateMoodSkin() {
    const h = new Date().getHours();
    let mood;
    if (h >= 6 && h < 10) mood = 'dawn';      // Matin doré
    else if (h >= 10 && h < 18) mood = 'day';  // Jour standard
    else if (h >= 18 && h < 22) mood = 'dusk'; // Crépuscule violet

        document.body.classList.add(`mood-${mood}`);

// ═══════ WAVEFORM AUDIO VISUALIZER ═══════
let analyser = null;
let waveformEl = null;
const WAVE_BARS = 24;

function initWaveform() {
    if (!audioCtx || analyser) return;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    // Insert between masterGain and destination
    masterGain.disconnect();
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function showWaveform() {
    if (waveformEl) return;
    const area = document.getElementById('chatArea');
    waveformEl = document.createElement('div');
    waveformEl.className = 'waveform-vis playing';
    waveformEl.id = 'waveformVis';
    for (let i = 0; i < WAVE_BARS; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = '3px';
        waveformEl.appendChild(bar);
    }
    area.appendChild(waveformEl);
    area.scrollTop = area.scrollHeight;
    animateWaveform();
}

function animateWaveform() {
    if (!waveformEl || !analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const bars = waveformEl.querySelectorAll('.bar');
    bars.forEach((bar, i) => {
        const val = data[i] || 0;
        bar.style.height = Math.max(3, (val / 255) * 28) + 'px';
    });
    if (isPlaying) requestAnimationFrame(animateWaveform);
    else hideWaveform();
}

function hideWaveform() {
    waveformEl?.remove();
    waveformEl = null;
}

// Patch playNext to show waveform
const _origPlayNext = playNext;
playNext = async function() {
    if (audioQueue.length === 0) { isPlaying = false; currentSource = null; hideWaveform(); return; }
    isPlaying = true;
    initWaveform();
    showWaveform();
    const buf = audioQueue.shift();
    try {
        const audioBuf = await audioCtx.decodeAudioData(buf.slice(0));
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(dreamGain, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(dreamGain, audioCtx.currentTime + audioBuf.duration - 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + audioBuf.duration);
        source.connect(gain).connect(masterGain);
        currentSource = source;
        source.onended = () => playNext();
        source.start();
    } catch { playNext(); }
};

// ═══════ VOICE MORPH ═══════
const VOICE_MORPH_PATTERNS = {
    'parle comme sly|voix de sly|imite sly': 'bradpitt',
    'parle comme bentley|voix de bentley': 'journtf1',
    'parle comme murray|voix de murray|voix murray': 'homersimpson',
    'parle comme omega|voix d.omega': 'freeman',
    'parle comme franklin|voix de franklin': 'gandalf',
    'parle comme sarko|voix de sarko|imite sarkozy': 'sarkozy',
    'voix de harry|harry potter': 'harrypotter',
    'voix de homer|homer simpson': 'homersimpson',
    'voix grave|voix profonde|voix de morgan': 'freeman',
    'voix de tom hanks|voix douce': 'tomhanks',
    'secret story|voix secret story': 'secretstory',
    'voix pujadas|voix de pujadas': 'pujadas',
    'voix du journal|voix tf1': 'journtf1',
};

let morphedVoice = null;

function detectVoiceMorph(text) {
    const t = text.toLowerCase();
    for (const [pattern, voice] of Object.entries(VOICE_MORPH_PATTERNS)) {
        if (new RegExp(pattern, 'i').test(t)) {
            morphedVoice = voice;
            return voice;
        }
    }
    // Reset morph after one use? No, keep it until changed
    return null;
}

// Patch speakText to use morphed voice
const _origSpeakText = speakText;
speakText = async function(agentKey, fullText) {
    if (!autoSpeak || !fullText.trim()) return;
    initAudio();
    const voiceKey = morphedVoice || AGENTS[agentKey]?.voice || 'bradpitt';
    const modelId = VOICES[voiceKey];
    if (!modelId) return;

    const sentences = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
    const chunks = [];
    let current = '';
    for (const s of sentences) {
        if ((current + s).length > 290) {
            if (current) chunks.push(current.trim());
            current = s;
        } else { current += s; }
    }
    if (current.trim()) chunks.push(current.trim());

    const promises = chunks.map(chunk =>
        fetch('https://api.fish.audio/v1/tts', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${FISH_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: chunk, reference_id: modelId, format: 'mp3', latency: 'balanced' })
        }).then(r => r.ok ? r.arrayBuffer() : null).catch(() => null)
    );

    const buffers = await Promise.all(promises);
    for (const buf of buffers) {
        if (buf) audioQueue.push(buf);
    }
    if (!isPlaying) playNext();
};

// ═══════ NOTIFICATION SOUNDS (Web Audio Synth) ═══════
let soundEnabled = true;

function playTone(freq, duration = 0.1, type = 'sine', vol = 0.15) {
    if (!soundEnabled || !audioCtx) return;
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol * dreamGain, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function soundClick() { playTone(800, 0.06, 'sine', 0.08); }
function soundSend() { playTone(600, 0.08, 'sine', 0.1); playTone(900, 0.08, 'sine', 0.1); }
function soundReceive() { playTone(500, 0.12, 'triangle', 0.1); }
function soundXP() { playTone(1200, 0.15, 'sine', 0.08); }
function soundLevelUp() {
    playTone(523, 0.15, 'sine', 0.15);

}

// ═══════ HAPTIC FEEDBACK ═══════
function haptic(style = 'light') {
    if (!navigator.vibrate) return;
    switch (style) {
        case 'light': navigator.vibrate(10); break;
        case 'medium': navigator.vibrate(25); break;
        case 'heavy': navigator.vibrate([30, 20, 50]); break;
        case 'success': navigator.vibrate([15, 50, 15, 50, 30]); break;
    }
}

// ═══════ MARKDOWN RENDERING ═══════
function renderMarkdown(text) {
    let html = escapeHTML(text);
    // Code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
}

const REACTION_EMOJIS = ['🔥', '👏', '💡', '😂', '❤️', '🦝'];

function showReactionPicker(bubbleEl) {
    // Remove existing pickers
    document.querySelectorAll('.reaction-picker.visible').forEach(p => p.classList.remove('visible'));

    let picker = bubbleEl.querySelector('.reaction-picker');
    if (!picker) {
        picker = document.createElement('div');
        picker.className = 'reaction-picker';
        REACTION_EMOJIS.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'reaction-pick';
            btn.textContent = emoji;
            btn.onclick = (e) => {
                e.stopPropagation();
                addReaction(bubbleEl, emoji);
                picker.classList.remove('visible');
                haptic('medium');
            };
            picker.appendChild(btn);
        });
        bubbleEl.appendChild(picker);
    }
    picker.classList.add('visible');
    haptic('light');

    // Auto-hide after 3s
    setTimeout(() => picker.classList.remove('visible'), 3000);
}

function addReaction(bubbleEl, emoji) {
    const bar = bubbleEl.querySelector('.reactions-bar');
    if (!bar) return;
    // Check if reaction exists
    const existing = bar.querySelector(`[data-emoji="${emoji}"]`);
    if (existing) {
        const countEl = existing.querySelector('.reaction-count');
        const c = parseInt(countEl.textContent || '1') + 1;
        countEl.textContent = c;
        existing.classList.add('active');
    } else {
        const el = document.createElement('button');
        el.className = 'reaction active';
        el.dataset.emoji = emoji;
        el.innerHTML = `${emoji}<span class="reaction-count">1</span>`;
        el.onclick = () => {
            el.classList.toggle('active');
            haptic('light');
        };
        bar.appendChild(el);
    }
    soundClick();
}

];

let dailyProgress = {};
let dailyAgentsUsed = new Set();

function getTodayChallenge() {
    const today = new Date().toDateString();
    // Hash the date to get a consistent challenge index
    let hash = 0;
    for (let i = 0; i < today.length; i++) { hash = ((hash << 5) - hash) + today.charCodeAt(i); hash |= 0; }
    return DAILY_CHALLENGES[Math.abs(hash) % DAILY_CHALLENGES.length];
}

function loadDailyProgress() {
    const saved = JSON.parse(localStorage.getItem('sly_daily') || '{}');
    if (saved.date === new Date().toDateString()) {
        dailyProgress = saved;
        dailyAgentsUsed = new Set(saved.agentsUsed || []);
    } else {
        dailyProgress = { date: new Date().toDateString(), completed: false };
        dailyAgentsUsed = new Set();
    }
}

function saveDailyProgress() {
    dailyProgress.date = new Date().toDateString();
    dailyProgress.agentsUsed = [...dailyAgentsUsed];
    localStorage.setItem('sly_daily', JSON.stringify(dailyProgress));
}

function trackDaily(type, value = 1) {
    if (dailyProgress.completed) return;
    const challenge = getTodayChallenge();
    if (type === 'agents_used') {
        dailyAgentsUsed.add(value);
        dailyProgress[type] = dailyAgentsUsed.size;
    } else {
        dailyProgress[type] = (dailyProgress[type] || 0) + value;
    }

    if ((dailyProgress[challenge.track] || 0) >= challenge.target && !dailyProgress.completed) {
        dailyProgress.completed = true;
        addBubble('agent', 'pixel', `🏆 CHALLENGE COMPLÉTÉ ! "${challenge.title}" — +${challenge.xp} XP bonus !`);
        gainXP(challenge.xp);
        soundLevelUp();
        haptic('heavy');
    }
    saveDailyProgress();
    renderDailyChallenge();
}

function renderDailyChallenge() {
    let el = document.getElementById('dailyChallenge');
    const challenge = getTodayChallenge();
    const progress = Math.min(dailyProgress[challenge.track] || 0, challenge.target);
    const pct = Math.round((progress / challenge.target) * 100);
    const circumference = 2 * Math.PI * 16;
    const dashOffset = circumference - (pct / 100) * circumference;

    if (!el) {
        el = document.createElement('div');
        el.className = 'daily-challenge';
        el.id = 'dailyChallenge';
        const chatArea = document.getElementById('chatArea');
        chatArea.parentElement.insertBefore(el, chatArea);
    }

    el.innerHTML = `
        <div class="daily-icon">${dailyProgress.completed ? '✅' : '🎯'}</div>
        <div class="daily-info">
            <div class="daily-title">${dailyProgress.completed ? 'COMPLÉTÉ' : 'DÉFI DU JOUR'}</div>
            <div class="daily-desc">${challenge.desc} (+${challenge.xp} XP)</div>
        </div>
        <div class="daily-progress">
            <svg width="40" height="40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
            <circle cx="20" cy="20" r="16" fill="none" stroke="${dailyProgress.completed ? 'var(--green)' : 'var(--blue)'}" stroke-width="3" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/></svg>
            <div class="daily-progress-text">${progress}/${challenge.target}</div>
        </div>`;
}

let sessions = JSON.parse(localStorage.getItem('sly_sessions') || '[]');
let currentSessionId = null;

function generateSessionId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function startNewSession() {
    // Save current session before starting new
    if (currentSessionId && conversationHistory.length > 0) {
        saveSession();
    }
    currentSessionId = generateSessionId();
    conversationHistory = [];
    document.getElementById('chatArea').innerHTML = '';
    saveState();
    closeRewind();
}

function saveSession() {
    if (!currentSessionId || conversationHistory.length === 0) return;
    const existing = sessions.findIndex(s => s.id === currentSessionId);
    const sessionData = {
        id: currentSessionId,
        date: new Date().toISOString(),
        preview: conversationHistory[0]?.content?.slice(0, 100) || '',
        lastAgent: currentAgent,
        messageCount: conversationHistory.length,
        history: conversationHistory.slice(-40) // Keep last 40 messages per session
    };
    if (existing >= 0) sessions[existing] = sessionData;
    else sessions.unshift(sessionData);
    // Keep max 20 sessions
    if (sessions.length > 20) sessions = sessions.slice(0, 20);
    try { localStorage.setItem('sly_sessions', JSON.stringify(sessions)); } catch {}
}

function loadSession(sessionId) {
    const session = sessions.find(s => s.id === sessionId);
    if (!session) return;

    // Save current first
    if (currentSessionId && conversationHistory.length > 0) saveSession();

    currentSessionId = session.id;
    conversationHistory = session.history || [];

    // Rebuild chat
    const area = document.getElementById('chatArea');
    area.innerHTML = '';
    for (const msg of conversationHistory) {
        if (msg.role === 'user') {
            addBubble('user', null, msg.content);
        } else {
            addBubble('agent', currentAgent, msg.content);
        }
    }
    closeRewind();
    haptic('medium');
}

function openRewind() {
    // Save current session before showing list
    if (conversationHistory.length > 0) saveSession();

    const panel = document.getElementById('rewindPanel');
    const backdrop = document.getElementById('rewindBackdrop');
    const list = document.getElementById('rewindList');

    list.innerHTML = '';
    if (sessions.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px">Aucune session sauvegardée.<br>Commence à discuter !</div>';
    } else {
        sessions.forEach(s => {
            const date = new Date(s.date);
            const timeStr = date.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }) + ' ' + date.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
            const agent = AGENTS[s.lastAgent] || AGENTS.sly;
            const isCurrent = s.id === currentSessionId;
            const el = document.createElement('div');
            el.className = 'rewind-item';
            if (isCurrent) el.style.borderLeft = '3px solid var(--blue)';
            el.innerHTML = `

            el.onclick = () => loadSession(s.id);
            list.appendChild(el);
        });
    }

    panel.classList.add('open');
    backdrop.classList.add('open');
    backdrop.onclick = closeRewind;
    soundClick();
}

    document.getElementById('rewindPanel').classList.remove('open');

// ═══════ 4-LAYER MEMORY SYSTEM ═══════
// Layer 1: Buffer (last 20 messages — RAM, already exists as conversationHistory)
// Layer 2: Summary (compressed summaries per session)
// Layer 3: Profile (strategic user preferences)
// Layer 4: Deep Memory (keyword-indexed facts)

const memory = {
    summaries: [],    // Layer 2
    profile: {},      // Layer 3
    facts: [],        // Layer 4
};

function loadMemory() {
    try {
        const saved = JSON.parse(localStorage.getItem('sly_memory') || '{}');
        memory.summaries = saved.summaries || [];
        memory.profile = saved.profile || { name: 'Augus', interests: [], prefs: {} };
        memory.facts = saved.facts || [];
    } catch {}
}

function saveMemory() {
    try { localStorage.setItem('sly_memory', JSON.stringify(memory)); } catch {}
}

// Extract facts from conversation
function extractFacts(text, role) {
    const factPatterns = [
        /je m'appelle (\w+)/i,
        /mon (?:nom|prénom) (?:est|c'est) (\w+)/i,
        /j'aime (.+?)(?:\.|$)/i,
        /je préfère (.+?)(?:\.|$)/i,
        /je travaille (?:sur|dans|comme) (.+?)(?:\.|$)/i,
        /mon projet (.+?)(?:\.|$)/i,
        /je suis (\w+)/i,
    ];

    if (role === 'user') {
        for (const pattern of factPatterns) {
            const match = text.match(pattern);
            if (match) {
                const fact = { text: match[0], extracted: match[1], date: new Date().toISOString(), source: 'user' };
                // Avoid duplicates
                if (!memory.facts.some(f => f.text === fact.text)) {
                    memory.facts.push(fact);
                    if (memory.facts.length > 50) memory.facts.shift();
                    saveMemory();
                }
            }
        }
    }
}

// Summarize session (simple — take first+last messages, compress)
function summarizeSession(history) {
    if (history.length < 4) return null;
    const topics = [];
    for (const msg of history) {
        if (msg.role === 'user' && msg.content.length > 10) {
            topics.push(msg.content.slice(0, 80));
            if (topics.length >= 3) break;
        }
    }
    return {
        date: new Date().toISOString(),
        topics,
        messageCount: history.length,
    };
}

// Build memory context for LLM
function buildMemoryContext() {
    let ctx = '';
    // Layer 3: Profile
    if (memory.profile.name) ctx += `L'utilisateur s'appelle ${memory.profile.name}. `;
    if (memory.profile.interests?.length) ctx += `Intérêts : ${memory.profile.interests.join(', ')}. `;

    // Layer 4: Recent facts
    if (memory.facts.length > 0) {
        const recentFacts = memory.facts.slice(-5).map(f => f.text).join('; ');
        ctx += `Faits mémorisés : ${recentFacts}. `;
    }

    // Layer 2: Recent session summaries
    if (memory.summaries.length > 0) {
        const lastSummary = memory.summaries[memory.summaries.length - 1];
        ctx += `Dernière session : ${lastSummary.topics?.join(', ') || 'N/A'}. `;
    }

    return ctx;
}

// Patch buildSystemPrompt to include memory
const _origBuildSystemPrompt = buildSystemPrompt;
buildSystemPrompt = function(agentKey) {
    const base = _origBuildSystemPrompt(agentKey);
    const memCtx = buildMemoryContext();
    if (memCtx) return base + '\n\nMÉMOIRE CONTEXTUELLE :\n' + memCtx;
    return base;
};

// ═══════ AGENT COALITION MODE ═══════
const COALITION_TRIGGERS = [
    /tous les agents|tout le building|mobilisation|coalition|réunion/i,
    /avis de|qu'en pensez|demandez aux agents/i,
    /brainstorm|conclave|débat/i,
];

function isCoalitionQuery(text) {
    return COALITION_TRIGGERS.some(p => p.test(text));
}

async function runCoalition(text) {
    // Pick 3 relevant agents
    const primary = detectAgent(text);
    const pool = AGENT_KEYS.filter(k => k !== primary);
    const agent2 = pool[Math.floor(Math.random() * pool.length)];
    const remaining = pool.filter(k => k !== agent2);
    const agent3 = remaining[Math.floor(Math.random() * remaining.length)];
    const coalition = [primary, agent2, agent3];

    // Show coalition banner
    const area = document.getElementById('chatArea');
    const banner = document.createElement('div');
    banner.className = 'coalition-banner';
    banner.innerHTML = `
        <div class="coalition-agents">${coalition.map(k => `<div class="coalition-avatar">${AGENTS[k].emoji}</div>`).join('')}</div>
        <span>⚔️ Coalition activée — ${coalition.map(k => AGENTS[k].name).join(' + ')}</span>`;
    area.appendChild(banner);
    area.scrollTop = area.scrollHeight;
    haptic('heavy');

    // Ask each agent sequentially (short responses)
    for (const agentKey of coalition) {
        const thinkingEl = addThinking(agentKey);
        const sysPrompt = buildSystemPrompt(agentKey) + '\nRéponds en 1-2 phrases MAX. Tu fais partie d\'une coalition de 3 agents.';
        const msgs = [
            { role: 'system', content: sysPrompt },
            ...conversationHistory.slice(-6),
            { role: 'user', content: text }
        ];

        try {
            const resp = await callGroq(msgs, 'llama-3.1-8b-instant', 100);
            if (resp && resp.ok) {
                const response = await streamResponse(resp, thinkingEl, agentKey);
                conversationHistory.push({ role: 'assistant', content: `[${AGENTS[agentKey].name}] ${response}` });
                if (autoSpeak && agentKey === coalition[coalition.length - 1]) {
                    speakText(agentKey, response);
                }
            } else { thinkingEl?.remove(); }
        } catch {
            thinkingEl?.remove();
            addBubble('agent', agentKey, `${AGENTS[agentKey].emoji} Pas de signal pour l'instant.`);
        }
    }

    trackBadgeStat('coalitions');
    gainXP(25);
    saveState();
}

let cmdPaletteVisible = false;
let cmdSelectedIdx = 0;
let cmdFiltered = [...COMMANDS];

function openCmdPalette() {
    let palette = document.getElementById('cmdPalette');
    if (!palette) {
        palette = document.createElement('div');
        palette.className = 'cmd-palette';
        palette.id = 'cmdPalette';
        palette.innerHTML = `
            <input class="cmd-input" id="cmdInput" placeholder="Tapez une commande..." autocomplete="off">
            <div class="cmd-list" id="cmdList"></div>`;
        document.body.appendChild(palette);

        const cmdInput = document.getElementById('cmdInput');
        cmdInput.addEventListener('input', (e) => filterCommands(e.target.value));
        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeCmdPalette();
            else if (e.key === 'ArrowDown') { cmdSelectedIdx = Math.min(cmdSelectedIdx + 1, cmdFiltered.length - 1); renderCmdList(); }
            else if (e.key === 'ArrowUp') { cmdSelectedIdx = Math.max(cmdSelectedIdx - 1, 0); renderCmdList(); }
            else if (e.key === 'Enter' && cmdFiltered[cmdSelectedIdx]) { cmdFiltered[cmdSelectedIdx].action(); }
        });
    }

    cmdFiltered = [...COMMANDS];
    cmdSelectedIdx = 0;
    palette.classList.add('visible');
    cmdPaletteVisible = true;
    renderCmdList();
    setTimeout(() => document.getElementById('cmdInput').focus(), 50);
    soundClick();
}

function closeCmdPalette() {
    document.getElementById('cmdPalette')?.classList.remove('visible');
    cmdPaletteVisible = false;
    const cmdInput = document.getElementById('cmdInput');
    if (cmdInput) cmdInput.value = '';
}

function filterCommands(query) {
    const q = query.toLowerCase().replace(/^\//, '');
    cmdFiltered = COMMANDS.filter(c => c.label.toLowerCase().includes(q) || c.hint.toLowerCase().includes(q));
    cmdSelectedIdx = 0;
    renderCmdList();
}

function renderCmdList() {
    const list = document.getElementById('cmdList');
    if (!list) return;
    list.innerHTML = cmdFiltered.map((c, i) => `
        <div class="cmd-item${i === cmdSelectedIdx ? ' selected' : ''}" onclick="COMMANDS.find(x=>x.hint==='${c.hint}')?.action()">
            <span class="cmd-item-icon">${c.icon}</span>
            <span class="cmd-item-label">${c.label}</span>
            <span class="cmd-item-hint">${c.hint}</span>
        </div>`).join('');
}

        const q = e.target.value.toLowerCase().trim();
        const results = document.getElementById('searchResults');
        if (q.length < 2) { results.innerHTML = ''; return; }

        // Search in all sessions + current
        let matches = [];
        for (const msg of conversationHistory) {
            if (msg.content.toLowerCase().includes(q)) {
                matches.push({ content: msg.content, role: msg.role, session: 'current' });
            }
        }
        for (const session of sessions) {
            for (const msg of (session.history || [])) {
                if (msg.content.toLowerCase().includes(q)) {
                    matches.push({ content: msg.content, role: msg.role, session: new Date(session.date).toLocaleDateString('fr-FR') });
                }
            }
        }

        results.innerHTML = matches.length === 0
            ? '<div style="text-align:center;padding:20px;color:var(--text-dim)">Aucun résultat</div>'
            : matches.slice(0, 20).map(m => {
                const highlighted = m.content.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<span class="search-highlight">$1</span>');
                return `<div class="search-result">
                    <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${m.role === 'user' ? '👤 Toi' : '🤖 Agent'} · ${m.session}</div>

// ═══════ AMBIENT SOUNDSCAPE ═══════
let ambientOsc = null;
let ambientGain = null;
let ambientNoiseNode = null;
let currentAmbient = null;

const AMBIENT_PRESETS = {
    rain: { label: '🌧️ Pluie', freq: 200, type: 'noise', vol: 0.03, filter: 800 },
    space: { label: '🌌 Space', freq: 80, type: 'sine', vol: 0.02, lfo: 0.1 },
    focus: { label: '🎯 Focus', freq: 432, type: 'sine', vol: 0.015, lfo: 0.05 },
    night: { label: '🌙 Night', freq: 120, type: 'triangle', vol: 0.02, lfo: 0.08 },
};

function createNoiseNode() {
    if (!audioCtx) return null;
    const bufSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) output[i] = Math.random() * 2 - 1;
    const node = audioCtx.createBufferSource();
    node.buffer = noiseBuffer;
    node.loop = true;
    return node;
}

function startAmbient(presetKey) {
    stopAmbient();
    initAudio();
    const preset = AMBIENT_PRESETS[presetKey];
    if (!preset) return;

    currentAmbient = presetKey;
    ambientGain = audioCtx.createGain();
    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGain.gain.linearRampToValueAtTime(preset.vol * dreamGain, audioCtx.currentTime + 2);

    if (preset.type === 'noise') {
        ambientNoiseNode = createNoiseNode();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = preset.filter || 1000;
        ambientNoiseNode.connect(filter).connect(ambientGain).connect(audioCtx.destination);
        ambientNoiseNode.start();
    } else {
        ambientOsc = audioCtx.createOscillator();
        ambientOsc.type = preset.type;
        ambientOsc.frequency.setValueAtTime(preset.freq, audioCtx.currentTime);
        if (preset.lfo) {
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = preset.lfo;
            lfoGain.gain.value = preset.freq * 0.02;
            lfo.connect(lfoGain).connect(ambientOsc.frequency);
            lfo.start();
        }
        ambientOsc.connect(ambientGain).connect(audioCtx.destination);
        ambientOsc.start();
    }

    document.querySelector('.ambient-btn')?.classList.add('active');
    localStorage.setItem('sly_ambient', presetKey);
}

function stopAmbient() {
    if (ambientOsc) { try { ambientOsc.stop(); } catch {} ambientOsc = null; }
    if (ambientNoiseNode) { try { ambientNoiseNode.stop(); } catch {} ambientNoiseNode = null; }
    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
    currentAmbient = null;
    document.querySelector('.ambient-btn')?.classList.remove('active');
    localStorage.removeItem('sly_ambient');
}

function toggleAmbientMenu() {
    let menu = document.querySelector('.ambient-menu');
    if (!menu) {
        menu = document.createElement('div');
        menu.className = 'ambient-menu';
        let html = '';
        for (const [key, preset] of Object.entries(AMBIENT_PRESETS)) {
            html += `<div class="ambient-option ${currentAmbient === key ? 'active' : ''}" onclick="toggleAmbient('${key}')">${preset.label}</div>`;
        }
        html += `<div class="ambient-option" onclick="stopAmbient();this.closest('.ambient-menu').classList.remove('visible')">❌ Off</div>`;
        menu.innerHTML = html;
        document.body.appendChild(menu);
    }
    menu.classList.toggle('visible');
    // Update active states
    menu.querySelectorAll('.ambient-option').forEach(opt => {
        const key = opt.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
        if (key) opt.classList.toggle('active', currentAmbient === key);
    });
}

function toggleAmbient(key) {
    if (currentAmbient === key) stopAmbient();
    else startAmbient(key);
    document.querySelector('.ambient-menu')?.classList.remove('visible');
}

// ═══════ SWIPE GESTURES ON BUBBLES ═══════
function initSwipeGestures() {
    const area = document.getElementById('chatArea');
    let startX = 0, startY = 0, swiping = false, swipeBubble = null;

    area.addEventListener('touchstart', (e) => {
        const bubble = e.target.closest('.bubble.agent');
        if (!bubble) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        swiping = true;
        swipeBubble = bubble;
    }, { passive: true });

    area.addEventListener('touchmove', (e) => {
        if (!swiping || !swipeBubble) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (Math.abs(dy) > Math.abs(dx)) { swiping = false; return; } // Vertical scroll
        if (Math.abs(dx) > 30) {
            swipeBubble.style.transform = `translateX(${dx * 0.3}px)`;
            swipeBubble.style.opacity = 1 - Math.abs(dx) / 500;
        }
    }, { passive: true });

    area.addEventListener('touchend', (e) => {
        if (!swiping || !swipeBubble) return;
        const dx = e.changedTouches[0].clientX - startX;
        swipeBubble.style.transform = '';
        swipeBubble.style.opacity = '';

        if (dx > 80) {
            // Swipe right = like/reaction
            addReaction(swipeBubble, '🔥');
            haptic('light');
        } else if (dx < -80) {
            // Swipe left = replay audio
            const text = swipeBubble.querySelector('.bubble-text')?.textContent;
            const name = swipeBubble.querySelector('.bubble-name')?.textContent?.toLowerCase();
            const agentKey = AGENT_KEYS.find(k => AGENTS[k].name === name?.toUpperCase()) || currentAgent;
            if (text) speakText(agentKey, text);
            haptic('medium');
        }

        swiping = false;
        swipeBubble = null;
    }, { passive: true });
}

// ═══════ AGENT MOOD INDICATOR ═══════
function getAgentMood(agentKey) {
    const interactions = JSON.parse(localStorage.getItem('sly_agent_interactions') || '{}');
    const lastUse = interactions[agentKey];
    if (!lastUse) return 'idle';
    const daysSince = (Date.now() - lastUse) / 86400000;
    if (daysSince < 1) return 'active';
    if (daysSince < 3) return 'neutral';
    if (daysSince < 7) return 'bored';
    return 'idle';
}

function trackAgentInteraction(agentKey) {
    const interactions = JSON.parse(localStorage.getItem('sly_agent_interactions') || '{}');
    interactions[agentKey] = Date.now();
    localStorage.setItem('sly_agent_interactions', JSON.stringify(interactions));
}

// Patch renderDock to show mood dots
const _origRenderDock = renderDock;
renderDock = function() {
    _origRenderDock();
    // Add mood dots
    const agents = document.querySelectorAll('.dock-agent');
    DOCK_DEFAULT.forEach((key, i) => {
        if (!agents[i]) return;
        agents[i].style.position = 'relative';
        const mood = getAgentMood(key);
        const colors = { active: 'var(--green)', neutral: 'var(--orange)', bored: 'var(--text-dim)', idle: 'transparent' };
        const dot = document.createElement('div');
        dot.className = 'dock-mood';
        dot.style.background = colors[mood] || 'transparent';
        agents[i].appendChild(dot);
    });
};

// Patch detectAgent to track interactions
const _p3DetectAgent = detectAgent;
detectAgent = function(text) {
    const result = _p3DetectAgent(text);
    trackAgentInteraction(result);
    return result;
};

// Patch addBubble to include reply button and show reply refs
const _p4AddBubble = addBubble;
addBubble = function(type, agentKey, text, streaming = false) {
    const el = _p4AddBubble(type, agentKey, text, streaming);

    // Add reply button to agent bubbles
    if (type === 'agent' && agentKey) {
        const meta = el.querySelector('.bubble-meta');
        if (meta) {
            const replyBtn = document.createElement('button');
            replyBtn.className = 'reply-btn';
            replyBtn.textContent = '↩ Répondre';
            replyBtn.onclick = (e) => { e.stopPropagation(); setReplyTo(el); };
            meta.appendChild(replyBtn);
        }
    }

    // If replying, add reply reference to new bubble
    if (replyingTo && type === 'user') {
        const ref = document.createElement('div');
        ref.className = 'reply-ref';
        ref.innerHTML = `<span class="reply-ref-name">${replyingTo.name}</span> ${escapeHTML(replyingTo.text.slice(0, 60))}...`;
        ref.onclick = () => replyingTo?.element?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.insertBefore(ref, el.firstChild);
        cancelReply();
    }

    return el;
};

// ═══════ AGENT LEADERBOARD ═══════
function getAgentLeaderboard() {
    const interactions = JSON.parse(localStorage.getItem('sly_agent_interactions') || '{}');
    const counts = {};
    // Count from conversation history across all sessions
    const allHistory = [...conversationHistory];
    for (const session of sessions) {
        if (session.history) allHistory.push(...session.history);
    }
    for (const msg of allHistory) {
        if (msg.role === 'assistant') {
            const match = msg.content.match(/^\[(\w+)\]/);
            if (match) {
                const name = match[1].toLowerCase();
                counts[name] = (counts[name] || 0) + 1;
            }
        }
    }
    // Also count from agent interactions timestamps
    for (const key of AGENT_KEYS) {
        if (interactions[key] && !counts[key]) counts[key] = 1;
    }
    // Sort by count
    return Object.entries(counts)
        .map(([key, count]) => ({ key, count, agent: AGENTS[key] }))
        .filter(e => e.agent)
        .sort((a, b) => b.count - a.count);
}

// ═══════ KEYBOARD SHORTCUTS ═══════
document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + K = command palette
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (cmdPaletteVisible) closeCmdPalette();
        else openCmdPalette();
    }
    // Escape = close everything
    if (e.key === 'Escape') {
        closeCmdPalette();
        closeAgentModal();
        closeSettings();
        closeRewind();
        cancelReply();
        document.querySelector('.ambient-menu')?.classList.remove('visible');
    }
    // Ctrl + Shift + A = agent modal
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'A') {
        e.preventDefault();
        openAgentModal();
    }
    // Ctrl + Shift + E = export
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'E') {
        e.preventDefault();
        cmdExport();
    }
    // Ctrl + Shift + S = search
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
        e.preventDefault();
        cmdSearch();
    }
});

// ═══════ IMAGE/FILE SHARING (base64) ═══════
function addFileInput() {
    const inputRow = document.querySelector('.input-row');
    if (!inputRow || document.getElementById('fileBtn')) return;

    const fileBtn = document.createElement('button');
    fileBtn.id = 'fileBtn';
    fileBtn.className = 'btn-icon';
    fileBtn.style.cssText = 'width:40px;height:40px;font-size:18px;flex-shrink:0';
    fileBtn.textContent = '📎';
    fileBtn.onclick = () => document.getElementById('fileInput')?.click();

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.id = 'fileInput';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.onchange = handleFileSelect;

    inputRow.insertBefore(fileBtn, inputRow.firstChild);
    inputRow.appendChild(fileInput);
}

function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        addBubble('agent', 'sly', "Je ne peux lire que des images pour l'instant.");
        return;
    }

    if (file.size > 2 * 1024 * 1024) {
        addBubble('agent', 'sly', "Image trop lourde (max 2MB). Compresse-la d'abord.");
        return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        // Show image in chat
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'bubble user';
        div.innerHTML = `
            <img src="${dataUrl}" style="max-width:100%;border-radius:12px;max-height:300px;object-fit:contain" alt="Image partagée">
            <div class="bubble-meta"><span>${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;

        // Send description request to LLM
        sendMessage(`[Image partagée : ${file.name}, ${(file.size/1024).toFixed(0)}KB] Décris ce que tu vois et donne ton avis.`);
    };
    reader.readAsDataURL(file);
    e.target.value = ''; // Reset
}
